body:
  text: 肆獻祼饋食禮禮類二儀禮之屬提要臣等謹按肆獻祼饋食禮三卷國朝任啓運撰是編以儀禮特牲少牢饋食禮皆士禮因據三禮及他傳記之有關于王禮者推之不得于經或求諸注疏以補之凡五篇一曰祭統二曰吉蠲三曰朝踐四曰正祭五曰繹祭其名則取周禮以肆獻祼享先生以饋食享先生之文每篇之內又各為節次每節先撮已說而自注其說之所出其後並附載經傳較之黃幹所續祭禮更為精密其中如吉蠲篇省視視濯節曰饔人溉鼎廩人溉甑甗司空溉豆籩及勺爵今考周禮天官世婦掌祭祀之事帥女宫而濯溉為齊盛賈疏謂少牢濯溉以雍人廪人司官者彼大夫家無婦官故并使男子官此天子禮有婦官與彼異啓運此書既推天子之禮而仍據少牢之文則世婦帥女官濯溉之文遂無歸宿又列位節啓運謂同姓皆在阼階自北而南以序昭穆爵位則于一世中自西而東以尊卑為序蓋世異則子不可先父世同則弟不妨先兄觀中庸于燕毛言序齒則昭穆不序齒可知案同姓之位舊說多岐文王世子公族在宗廟之中如外朝之位宗人授事以爵以官中庸宗廟之禮所以序昭穆也孔疏謂同姓無爵者從昭穆有爵者則以官與公侯列西階孔意蓋欲中庸與文王世子二義并歸一義其說尚為意測祭統田凡賜爵昭為一穆為一昭與穆齒穆與穆齒羣有司皆以齒此之謂長幼之序注曰昭穆猶特牲少牢饋食禮之衆兄弟則兄弟賜爵以齒其位亦以齒確有明文啓運不用孔義又不用鄭義别創昭穆不序齒之說與經義殊為不合又正祭篇有薦幣節自注云據薛氏禮圖鄭氏孔氏皆未及引大宰小宰文及大戴禮諸侯遷廟禮為據今考大宰曰及祀之日贊玉幣爵之事上承祀五帝之文不與宗廟相涉小宰曰凡祭祀贊玉幣爵之事祼將之事賈疏云贊玉幣爵據祭天而下云祼將是據祭宗廟則贊幣非祭宗廟明矣大宗伯以玉作六器其幣各以其方之色亦是據祀五帝言惟諸侯遷廟禮有云祝聲三曰孝嗣侯某敢以嘉幣告於皇考今考宗廟之禮惟告奠有幣而祭無幣故曽子問曰凡告用牲幣注曰牲當為制字之誤也制幣一丈八尺又大祝注云告用牲幣諸侯遷廟禮明云成廟將徙敢告又云告事畢乃曰擇日為祭焉則告禮而非祭禮明甚而啓運以之證宗廟正祭亦為牽附又正祭篇曰后又羞籩二糗餌粉餈羞豆二酏食糝食內饔贊薦自注云孔疏但云內饔薦茲據薛氏禮圗今考內饔職曰凡宗廟之祭祀掌割亨之事無薦內羞明文孔疏亦無所出又春官內宗曰掌宗廟之祭祀薦加豆籩夫加豆籩隆于內羞王后已不親薦况內羞乎啓運沿薛圖之誤亦為失考然大致綜核諸家首尾融貫極有倫要如后薦朝事豆籩啓運列在納牲之前薛圗列在三獻之後今考內宰疏曰王出迎特時祝延尸于戶外之西南面后薦八豆籩王牽牲入則啓運之說確有所本又考明堂位君肉袒迎牲于門夫人薦豆籩其下云君親牽牲大夫贊幣而從據此則朝事薦豆籩賈疏列在納牲之前甚確薛圖舛謬亦復顯然又后薦饋食之豆籩啓運列在五獻之前薛圖列在五獻之後今考鄭司奠彛注曰饋獻薦孰時后于是薦饋食之豆籩云薦孰時則其時初薦孰而未及五獻甚明故少牢禮主婦薦韭菹醓醢葵菹螺醢尚在尸未入以前即知后于饋食薦豆籩必不在五獻以下凡此之類啓運考正薛圗之誤俱精核分明存而録之與續儀禮通解亦可以詳略互考焉乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序禮莫重於祭儀禮之特牲少牢有司徹士大夫禮也而天子諸侯闕焉黃勉齊續通解宗廟禮在祭禮之第九混天子諸侯言之其節目則自廟制至告朔凡二十章大都割取三禮及他經傳文而全載注疏於其中未免傷於煩雜重復究於儀節之次第迄未之詳未可推而行之也夫勉齊續喪祭二門視朱子家鄉學邦國王朝禮其卷帙且多三之一惟博收而不加翦截聨絡故為書既繁僅同抄撮或謂其意蓋主於尊經不欲改竄以就我馳驅然竊疑割裂諸經分類綦緝以自成一家言毅然為其大者矣而猶復沿本經章句之舊不復輕踰短垣當不至是蓋此書猶為朱子未定之書非勉齊第欲其止於是也釣臺先生深於禮為天子肆獻祼饋食禮纂三卷凡五篇其大意倣朱子勉齊之所編次而其取諸翦截聨絡節目次第較然分明博而不蕪約而不略是固能成朱子勉齊未成之志者矣蓋天子祭禮散見於六官者為多先生鱗次櫛比一其統類使讀是書者如見成周廟祭之盛至今可行其文則薈萃古人絲牽魚貫爾雅深厚如出周公之所語孔門七十子之徒之所紀開卷散帙不復知為三代以下之書至其間經無其文而意以義起者即取特牲少牢之本經而參以為凖舉類見義確不可易始信漢儒推士禮而致於天子之說未為無稽乃知先生之學淵深𢎞達不拘於一隅其根柢純粹必本於考亭而其著述質有其文似乎轉有前人所未及者昔朱子甚善勉齊所立喪祭二禮規模因屬他日宜悉用此更定其所自著禮而勉齊用力於三禮自嘉定乙卯迄庚辰凡二十六年而書始成猶於祭禮遺藁有未及訂定之遺恨深望後之君子能繼其志嗚呼賢人君子講明正學繼往開來切切期以論著公之天下後世迄今六百年先生果起而成之然則儒者心心相印苟以斯文為己任必不使先賢遺恨不伸於來兹豈非吾學之幸哉先生著禮記章句十卷編次前後各從其類其分章畫節多本朱子綦儀禮義例因所纂集者不出乎戴記故題曰禮記類纂此書本倣儀禮而第曰天子肆獻祼饋食禮纂者蓋亦有微意存焉夫既取古人諸書裁制襞績以從吾之所說是即為自著書而猶冠以古經之名則於實已不稱萃嘗謂經傳通解此朱子之書而非周公之書然則先生此書不稱儀禮儻在斯乎先生講學最尊朱子朱子拳拳於三禮輔以勉齊迄未稱成書若使先生得盡將其所纂集家鄉學邦國王朝及喪祭二禮悉如此書例成一家言其文可誦即可推而行之而以儀禮十七篇仍還之髙堂生之舊益大成朱子之志惜乎所傳者僅此也後賢有志其推先生此書之例而克成之當亦先生所望也夫乾隆癸巳桂月髙平後學檀萃謹序
