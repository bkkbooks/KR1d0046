body:
  text: 天子肆獻祼饋食禮卷上宗人府丞任啟運撰儀禮特牲饋食禮諸侯之士之祭禮也少牢饋食禮諸侯之士之祭禮也特牲豕也少牢羊也天子之大夫得用太牢曲禮云大夫以索牛是也其禮與諸侯之大夫有同有異畧見詩楚茨篇薦血腥為朝事薦熟為饋食諸侯之大夫士有饋熟無朝事故皆以饋食名篇天子諸侯之祭禮亡矣今姑取其散見經傳者纂而輯之曰肆獻祼饋食禮纂使論禮者有考焉周禮以肆獻祼享先王以饋食享先王鄭氏𤣥曰肆獻祼祫也饋食禘也王氏肅曰宗廟既祼而獻而肆肆謂薦血腥也既肆乃饋熟愚按孔子言禘自既灌而往何以禘言饋食鄭說非也禮先祼後肆而先言肆者以血腥與薦熟對言之明非臣所有也或曰肆旅也及羣廟故旅獻祼祭統第一天子宗廟之祭春曰礿夏曰禘秋曰嘗冬曰烝據王制皇甫氐侃曰礿薄也春物未成祭品鮮薄禘第也次第舉之秋穀新熟可嘗故曰嘗孫氏炎曰冬物皆成可進者衆故曰烝愚按詩言禴祀烝嘗蓋礿即禴禘即祀古夏祭原以禘名後以禘為大祭故變文以别之以其祭於已月故謂之祀晉人曰寡君来禘祀猶兼言之而其文又通為祠也右時祭四周禮以祠春享先王以禴夏享先王以嘗秋享先王以烝冬享先王春官之按祠即禘祀祀此春夏文倒耳記天子犆礿祫禘祫嘗祫烝犆特也止用特牛若諸侯并不用牛故曰東鄰殺牛不如西鄰之禴祭其物薄其禮簡各於其廟祭之每日一廟即於其日賔尸祫合也合於太廟祭之春物未成未可以祫至夏秋冬乃祫也傳曰祭不欲數數則煩煩則不敬祭不欲疏疏則怠怠則忘故君子合諸天道春禘秋嘗以禘屬春誤同周禮霜露既降君子履之必有悽愴之心春雨露既濡君子履之必有怵惕之心如將見之祭義礿禘陽義也嘗烝隂義也禘者陽之盛也嘗者隂之盛也故曰莫重於禘嘗祭統陽翔曰陽進而贏故禘為盛隂退而縮故嘗為隂盛子曰嘗禘之禮所以仁昭穆也明乎嘗禘之禮治國其如示諸掌而已乎仲尼燕居三年大事於太廟五年而再殷祭據公羊傳禘大事杜預以為大何休以為大祫即大烝也上祫烝止及七廟此大祫則兼毁廟并及功臣上祫禘亦止及七廟此大禘則追所自出與毁廟故特言大以别之殷盛也中也右大祭二周禮四時之間祀追享朝享春官不間祀嘗舉也追享大禘也以追所自出故曰追享朝享大祫也合於太廟若大朝然故曰朝享禮不王不禘王者禘其祖之所自出以其祖配之諸侯及其太祖大傳鄭曰禘郊配天也王者感大㣲五帝之精以生若啇則白招拒周則靈威仰也祭法有虞氏禘黄帝鄭又曰禘祭昊天於圜丘也於南郊曰郊於圜丘曰禘王氏非之謂禘宗廟之大祭非於南郊於圜丘愚謂身所自出父也父所自出祖也推而上之至始祖止矣夫始祖所自出即天也周祖后稷履大人迹而生故詩止言姜嫄周禮享先妣皆不言髙辛是周非髙辛後其始以氣化天地即父母也其後夫人之生形化父母即天地也后稷有母而無父受氣於天成形於母此氣化形化之交天與人之際也周公禘所自出於廟無主虚位而東向以為天也可以為祖也可此聖人明於天人之故仁至而義盡也王氏據史記以帝嚳為后稷父周公所不言而史遷知之乎傳曰禘祭以夏四月夏者陽氣在上隂氣在下故正尊卑之義也祫祭以冬十月冬者五榖成熟物備禮成故合聚飲食也邢昺爾雅疏大祫毁廟之主陳於太祖未毁廟之主皆升合食於太祖公羊傳說按禘祫之先儒互異以時而言三年一祫五年一禘劉向說也三十月祫又三十月禘徐邈說也四月祫五月禘趙匡說也四月禘十月祫張純說也禘可春可夏祫必以秋某氏說也三年喪畢遷主于廟曰禘在即吉之月無有常期杜預說也喪畢遷主孫遞居王父之處禘之為言遞也劉歆賈逵鄭衆說也三年喪畢合先君之主于祖廟曰祫明年乃禘于羣廟鄭𤣥說也以等而言祫大禘小鄭𤣥賈公彦說也禘大祫小王肅何休說也取其序昭穆曰禘取其合羣祖曰祫祫禘為一孔穎達說也天子三年大祭曰禘諸侯三年大祭曰祫大夫三年大祭曰殷陳祥道說也王者有祫有禘諸侯有祫無禘張子說也以所祭而言祫取未遷廟主合食太廟禘取已遷廟主合食太廟通義說也祫及壇墠禘及郊宗石室馬融說也禘各於其廟祫則毁廟羣廟皆合太廟賈逵說也祫皆合食太廟禘則王季以上合食后稷廟成王以下凡穆合食文世室康王以下凡昭合食武世室鄭氏說也祫禘皆分此三廟陳祥道說也祫兼毁廟親廟禘不及羣廟趙匡說也祫止兼親廟毁廟禘兼親廟毁廟又追所自出程子說也禘及功臣祫不及功臣何休說也禘及者逺祀先后并及功臣蘇軾說也禘不及羣廟祫烝則及功臣楊復說也禘有大禘有夏禘祫有大祫有時祫馬端臨說也禘只時祭非大祭張存中說也烝嘗皆祫而不大惟祫禘為大故名曰大祫天子之禘追所自出魯禘不追所自出近世萬斯大說也愚謂先王之祭有隆有殺有疏有數數而殺者所以親親疏而隆者所以尊尊殯宫之祭止於三年禮所謂朝夕奠國語所謂日祭也三年祔廟後曽祖考皆月一祭國語所謂月祀也七廟之主四時皆一祭春則犆夏秋冬則祫國語所謂時享也三時皆祫故謂之時祫至三年則於冬祫獨隆其禮親廟毁廟皆合食太祖功臣與焉以其大于常時之祫烝故謂之大祫又謂之大烝周禮所謂朝享也又三十月當夏禘時又獨隆其禮上追始祖所自出止及毁廟而親廟之主不復升合食功臣亦不與焉以其大于常時之祫禘故謂之大禘周禮所謂追享也其不謂之大祫者親廟不合食也禘以四月祫以十月首時之正卜而不吉則在仲月故周禮以仲月明其極趙匡因謂禘以五月也喪三年不祭喪畢則舉大祭以遷主而祔廟當春夏則舉大禘而親廟之主亦升合食以便于遷當秋冬則舉大烝故春秋文公二年八月大事於太廟公羊以為大祫而杜預以為大禘因以禘為除喪劉賈以禘為遷主鄭謂三年喪畢則祫而亦春禘春祠秋祫諸誤所自來也以追所自出則大禘重故王何謂禘大祫小以兼親廟及功臣則大烝煩故鄭賈謂祫大禘小諸侯不追所自出則祫與禘同故孔陳謂禘祫一也周末世逺主煩太廟之室不足以容故自成康以下分禘於文武之廟此又趙匡不及羣廟之說所自起而朱子因之并謂止以始祖配而毁廟親廟之主皆不及也惟權衡於隆殺之宜疏數之節則諸儒之說一以貫之矣吉蠲第二吉言諏日擇士之吉蠲言齋戒滌濯之潔將祭必卜目先卜一日肆師為期卜之日冡宰大宗伯帥職事而卜肆師詔相龜人奉龜太史眡墨太卜眡髙命龜卜師作龜據周禮下肆師下大夫龜人中士太史太卜皆大夫卜師即卜人下士五官皆宗伯之屬也冡宰無所不統而大宗伯尤禮官之長故帥職事以卜眡視通墨以墨塗當卜處使坼易見也髙龜骨近足可卜處春卜後左夏卜前左秋卜前右冬卜後右太卜指以示宗伯而遂告龜以所卜之事也作鑚灼之也按禮士筮不述命大夫卜述命諸侯再述命則天子當親命之宗伯受命命太史太史告太卜太卜乃命龜凡三述命也右卜日記曰外事用剛日内事用柔日表記日用丁巳少牢也外事征伐巡狩之事剛日甲丙戊庚壬内事冠昏喪祭諸事柔日乙丁巳辛癸也用丁巳所謂柔日賈氏公彦曰亦取其令名自丁寧自變改皆致其敬謹之意也凶事先逺日吉事先近日曲禮卜來月上旬鄭註奪凶事情故先卜下旬下旬不吉乃及中旬上旬祭以致敬故先卜上旬上旬不吉乃及中旬下旬也易抱龜南面天子衮冕北面祭義凡卜祭皆祭服賈疏當易掌易之人此謂當卜時若初受命則天子西面禮享先王衮冕故卜以衮冕凡卜祭用祭服以交於神明也他事卜則異此君占體大夫占色史占墨卜人占坼周禮著龜坼而後墨見墨見而後色著色而後體定賤察其詳貴視其略也辭曰孝王某卜日丁亥用薦嵗事於先王尚饗某名也丁亥舉一以例之先公亦稱王統辭亦尊之也國語我先王后稷不窋述命命龜曰假爾泰龜有常孝王某卜日丁亥用薦嵗事於先王尚饗仿少牢曰若大祫禘則當大事傳曰先筮而後卜即事有漸也筮凶則不卜故曰卜筮不相襲也鄭氏疏卜不過三禮以三為成也王氏說三卜不吉則以仲月上旬祭周禮祭宗廟以四仲非孟月不得祭言下限也參左傳疏卜得吉遂戒内宰宿后夫人王齊于外后夫人齊于内冡宰誓戒百官大宗伯申戒大司冦涖誓并戒百族太史與羣執事讀禮書而協事宰夫以法式戒具與其薦羞祭僕警有司及百官之戒具司士戒士遂師審其戒誓布于國中王齊膳夫日三舉玉府共食玉鬯人共浴鬯巾車共齊車據周禮參祭義猶内宰下大夫統治宫中之事宿肅通戒也宰夫下大夫掌朝廷之位二官皆冡宰之屬祭僕中士掌受命于王以眡祭祀司士下大夫掌羣臣之版皆司馬之屬遂師下大夫掌遂之戒令司徒之屬也百官有列於朝者百族無爵而得與祭者謂王之族姓鄭謂府史胥徒愚謂若私臣及賔弟子兄弟之子皆是也冡宰誓而司冦涖之者劉氏謂禮大人衆非刑不肅也内而宫中外而百官百族逺而至於六遂之地無不戒焉合衆人之敬以為敬也膳夫下大夫掌王食飲膳羞玉府上士掌王金玉貨賄皆冡宰之屬殺牲盛饌曰舉日三舉舊云不食餕餘惡䙝也鄧氏曰當作不舉防散志滑精也食玉鄭氏衆曰食玉之屑王氏曰助精明之養也鬯人下士掌共秬鬯巾車下大夫掌王之五路后之五路皆宗伯之屬王浴以鬯襲其香也右齊戒記齊必變食居必遷坐論語齊者不樂不弔曲禮𤣥冠丹組纓諸侯之齊冠也𤣥冠綦組纓士之齊冠也玉藻綦天子當朱組纓朱深而丹稍淺蒼艾色傳曰齊之𤣥也以隂幽思也齊則綪結佩而爵韠同上結綪屈也鄭曰屈而之思神靈不在事也必有明衣布論語也明衣浴竟著之貴潔其以布貴誠也必有寢衣長一身有半同上衾不用䙝也齊則角枕錦衾詩毛傳或夫子之寢衣或錦衾有不備歟衣寢衣而加衾則心愈恭歟君齊車羔幦豹犆玉藻天子齊車羔幦虎犆幦覆式也犆縁也以虎豹皮縁羔皮覆之式上也傳曰齊之為言齊也心不苟慮必依於道手足不苟動必依於禮専致其精明之德以交於神明也祭統卜之日王立於澤親聽誓命受教諫之義也獻命庫門之内戒百官也太廟之内戒百姓也郊特牲誓戒及於羣臣衆庶欲合臣民之敬以事其先王也先期十日先戒尸戒者尸門外北面尸出門左西面儐者相戒者再拜祝致辭尸拜許諾戒者又拜稽首尸拜送據賈疏推之以擇可為尸者先戒之待卜右戒尸記外事尸異姓内事尸同姓非宗廟則尸不以同姓孔疏以外事郊社山川五祀若周公郊太公為尸祭泰山以召公為尸也内事宗廟之事孔子曰尸必以孫無孫則取於同姓曽子問一必以其人之後氣屬也孫可為王父尸昭穆同也子不可為父尸並曲禮也昭穆異父在子不為尸内則拜嫌於父其子也尸必以其適鄭註者不以庶不敢以賤依吾親也天子尸以卿諸侯尸以大夫鄭註大夫士尸用無爵者孔疏天子尸不以公諸侯尸不以卿為疑也明嫌之義也詩言公尸疏曰言此卿之尊比于下土諸侯諸侯得稱公實非公也卿不足則取諸卿以下大夫不足則取諸大夫以下尚爵也不敢以賤者依吾親也雖尚爵猶必取諸同姓昭穆之適也大夫尸無爵避君也孔子曰大夫士尸無問長幼故孔子曰孫幼使人抱之無禄者稷饋稷饋者無尸也大戴禮牲無禄謂庶人稷饋無也無尸賤不備禮祭殤者亦無尸據曽子問庶人無尸無威儀之可象也殤者無尸威儀未成亦無可象也辭致命曰孝王來日丁亥用薦嵗事於先王將以子加諸言卜敢告按天子不名廟中乃名此但稱孝王可也孔子曰尸弁冕而出曽子問服尸入廟則象乎神故服先王先公之遺衣未入廟則但服接神之服而已大夫之尸亦弁冕者孔曰大夫卑屈于君故尸服父祖自祭之上服人君禮伸故尸服助祭於君之上服卿大夫士皆下之尸必式卿大夫下敬其為君尸也卿大夫下而尸式為可為君之尸則已尊不可與卿大夫敵也君知所以為尸者則自下之尸必式俱曲禮也孔曰君出與尸遇散齊時君下而尸式廟門之外未全於尊不敢與君敵體也若敵則皆下矣尸乘必以几曲禮也安之必有前驅曽子問尊使人避之也先期三日卜尸卜吉再宿尸據賈疏以前但戒以當卜此則卜吉告也右卜尸記卜不吉則改卜鄭註辭命曰孝王某來日丁亥用薦嵗事於先王以某之子某為尸尚饗據少牢父上某尸父字下某尸名也鄭曰字尸父尸已亡尊鬼神不名也連其父者欲神易知而馮依之也宿者尸門外北面尸出門左南面宗人儐宿者再拜祝致辭尸拜許諾宿者又拜稽首尸送揖不拜據賈疏推之按大夫士禮主人親宿尸天子諸侯尊不迎尸則不親宿尸可知君在廟門外則全乎君尸不可以君臨之不親宿以尊尸也凡祭祀天子有故則宗伯攝又大事則冡宰涖事是冡宰宗伯皆可攝也北面不東面不為賔也尸南面天子諸侯尸尊也若大夫則尸西面而主人遂東面以順之士禮有祝有儐大夫即以祝儐避君也天子諸侯必備祝儐可知儐之數天子當六人上公五侯伯四子男三也祝致辭以與神接也祝致辭則儐無辭矣士卑尸不送大夫尊尸雖宿猶送天子諸侯彌尊尸必送也不拜送尸既宿則尊也不拜送而拜諾尸在廟門外未全乎尊也右宿尸辭致命曰孝王某來日丁亥用薦嵗事於先王卜子為先王某尸得吉卜敢宿先王某或字與諡也乃致齊王致齊於外后夫人致齊於内祭統申戒諸與祭者據賈疏右致齊傳散齊七日致齊三日散齊於外致齊於内齊之日思其居處思其笑語思其志意思其所樂思其所嗜齊三日乃見其所為齊者祭義之散齊若不樂不御不弔之類其出入則猶有致齊則更専一但居正寢之中不復出入也齊之日以致齊言夫賈曰士不得散齊但致齊三日而已孔曰大散齊九日致齊一日故少牢禮前一日宿尸賔也卜日得吉戒諸官散齊卜尸得吉戒諸官致齊賈疏宗伯請祭期王曰比於子據少牢定祭期謂時之早晏祭期有而必請者尊命也比於子言比次早晏在子尊禮也右請期記請期則朝服卜日祭服聽於神也請期朝服聽於君也傳夏后氏祭其闇殷人祭其陽周人祭日以朝及闇祭義色未鄉晨為闇日尚黒也日既出為陽日白也以朝及闇謂日始出日色赤也夏尚黒殷尚白周尚赤故始祭時其異如此方氏慤以日既沒為闇恐非先祭一日司徒奉牛封人飾牛設其楅衡置其絼宗伯奉雞司馬奉羊司冦奉犬司空奉豕服不氏奉猛獸冡宰大宗伯省牲小宗伯從充人告牷大宗伯眂滌濯宰夫從肆師詔相饔人溉鼎廩人溉甑甗司宫溉豆籩及勺爵祭僕糾百官之戒具禮畢告備於王據周禮少牢禮封人中士充人下士皆司徒之屬飾謂刷治潔清之楅衡施於牛角所以止觸絼著鼻繩也牛土畜雞木畜羊火畜犬金畜豕水畜故各以其官奉之天子有馬牲於易乾為馬坤為牛疑天官奉之周禮不言冡宰尊空其文也秋官大司冦喪祭奉馬牲知非喪司冦不奉也服不氏主服猛獸之不服者下士一人司馬之屬牲體全備曰牷饔人即内饔中士冡宰之屬廩人中大夫司徒之屬司宫疑即宫正也右省牲視濯記大夫攝官諸侯兼官天子六官具周禮牧人掌牧六牲祭祀供其犧牲以授充人充人繫於牢芻之三月士一牲豕大夫二牲加羊諸侯三牲加牛公卿四牲加犬傳古者天子諸侯必有養獸之官擇其毛而卜之吉然後養之君皮弁素積朔月月半君巡牲所以致力孝之至也祭義視按孔疏士牲視殺别日大夫視牲視殺不别日避君也則天子諸侯必前一日視牲記諸侯夫人先夕視濯天子先夕大宗伯視濯據詩采蘩疏按孔疏王后不親視濯故大宗伯代之士妻得與夫人同而特牲禮宗人視濯或士妻有故不得與則宗人代之也大夫妻前一日無事朝踐第三踐音翦殺也殺牲之事在朝故名朝踐祭之日雞人夜嘑旦以􅑧百官巾車鳴軨以應雞人司烜共明燭墳燭庭燎宫正執燭掌次張旅幕張尸次太史執書以序位常據周禮冦雞人下士宗伯之屬司烜下士司之屬宫正上士掌次下士皆冡宰之屬漏未盡三刻雞鳴之時則雞人呼旦以警百官早起而巾車即鳴軨以應之見夙駕也明燭在堂以照陳饌墳燭在門内庭燎在門外以照出入旅幕公卿衆官之幕公卿以下皆於門外以待事人多不能獨設故張大幕以待之尸次尸更衣之次書尊卑昭穆位次之冊太史執以序之使不紊也右戒旦設位周禮司烜供明火以陽燧取於日者委人供祭祀之薪蒸木材委人中士司徒之屬供之備炊及燎燭也記天子百燎上公五十侯伯子男三十大戴禮王夙興肆師築鬻鬯人共鬯鬱人薦鬯犧人薦醴天府陳盥具王祼鬯饗醴乃出就路車典路贊駕齊右陪乘師氏從保氏從太史從天府執燭太僕左馭而前驅大馭馭王司常建常節服氏維太常司戈盾授旅賁殳旅賁執殳夾車而趨奏王夏據周禮參國語鬯築𢷬也𢷬香草而煑以為也鬯人鬰人皆下士犧人周禮無之疑即司尊彛亦下士天府上士皆宗伯之屬祼鬯以鬯酒浴也路玉路典路中士宗伯之屬贊助也師氏中大夫掌道王美保氏下大夫掌諫王惡皆司徒之屬齊右下大夫為王車右太僕下大夫掌王服位大馭中大夫掌王玉輅皆司馬之屬王出則太僕為王先驅居車左而自御之避王也齊右則與王同乘而大馭御之以行旗畫日月為常有十二旒司常中士宗伯之屬節服下士世為王節衣服旅賁中士有膂力者皆司馬之屬司常建太常于車上而節服六人共持之以行其旅賁則夾車而行不在車也王夏九夏之一金奏九夏與笙奏南陔六篇皆有聲無辭鄭謂樂崩而九夏亡是也吕叔玉以時邁為肆夏非右王入廟記玉輅以祀錫樊纓十有二就建太常十有二旒鐘師掌金奏鎛師掌金奏之鼓周禮傳旗十有二旒龍章而設日月以象天也郊特牲后祼鬯饗醴如王出就重翟九嬪從世婦從内宗外宗從女史從女御從小臣前驅閽人蹕奏齊夏據周禮翟重翟重雉之羽以為蔽從王祭祀所乗猶天子之有玉路也天子一娶九女或十二女自后而外為九嬪為世婦若外世婦則侯伯子男之妻其齒德尤尊者則命為三夫人夫人世婦皆贊后之禮事如冡宰宗伯之贊王若三夫人不必備猶王之三公不必備故略言之也内宗王同姓女嫁於大夫士者外宗王諸姑姊妹之女與王異姓者女史掌執簡記奉諱惡猶王之有太史后亦有師毋傅毋猶王之有師氏保氏女御宫中執役者内小臣奄上士四人后出入則前驅有禮事則擯閽人掌蹕宫門一廟門使人避后行也二者皆冢宰之屬齊夏亦九夏之右后入廟記后入廟升自側階側階東下階也東阼天子所升降婦人不得由之故由庭入闈門至東下階升自東堂入於東房重翟錫面朱總有容蓋大宗伯省牲鑊小宗伯省齍鑊肆師告潔小史以書敘昭穆之俎簋司尊彛設四尊四彛鬱人實彛冪人冪彛鬯人飾鬯肆師展器陳告備外宗贊后眂豆籩於堂東據周禮或小史中士司尊彛下士皆宗伯之屬或時祭或大祫大禘其昭穆之數不同故小史以書敘之也尊彛各六祭用其二各二焉則四也其詳見後冪人奄一人冪尊以疏布冪彛以畫布王不親眂鼎鑊而后親眂豆籩中饋原婦人之事也若后有故不入廟亦小宗伯視之右省器傳祭必夫婦親之所以備外内之官也官備則具備祭統王衮冕立於阼后副褘立於東房據祭統公侯卿西階之前東面北上同姓東階之前西面北上大夫門東北面西上士門西北面東上旅食在其後據孔疏而略變之肆師詔相誅怠慢者周禮右列位記上公衮侯伯鷩子男毳鄭註王后褘衣夫人摇狄君命屈狄玉藻狄鷩雉也毳藻也摇揄通翟通揄翟色青刻而加采畫之君后也命謂命為世婦屈狄色赤但刻而不畫傳公族在宗廟之中如外朝之位宗人授事以爵以官以爵為位崇德也授事以官尊賢也文王世子宗廟之禮所以序昭穆也序爵所以辨貴賤也序事所以辨賢也中庸禮孔曰天子諸侯祭祀其位無文以士公有司門西北面東上私臣門東北面西上推之同姓無爵者在阼階前西面北上卿西階前東面北上大夫門東北面西上士門西北面東上旅食在其後又少牢下篇衆賓位在門東既獻在西階西南衆賓繼上賓而南天子諸侯之賓位當依此又曰同姓無爵者從昭穆有爵者則以官與公侯列西階愚按中庸言序昭穆世子記又言公族以爵為位似乎迥别鄭孔合之謂無爵者則序昭穆有爵者則序爵庶可兼通然愚思之又有未安者周之宗盟異姓為後有爵者入異姓不後之乎東階之下無一有爵者宗盟不太無色乎類族辨物禮之大者混同姓於異姓豈類族乎愚意阼階世次則自北而南以北為上以序昭穆爵位則於一世中自西而東以尊卑為序蓋世異則子不可先父故貴不敵親世同則弟不妨先兄故親不敵貴也觀中庸於燕毛言序齒則昭穆不序齒可知矣宗伯請賓王曰命某為賓宗伯命賔賔少進禮辭反命又命之賔再拜稽首許諾宗伯反命賔出立門外之西請佐食亦如之門外東面北上宗伯納賔攝主拜賔答拜入奏納夏佐食以次入及庭王降一等揖之賔就西階南東面佐食賔之南門東北面西上宗伯就東階南北面據詩疏其儀略放燕禮諸士前二日宿賔親之大夫前夕使人宿之天子侯已再戒故但於即日命之也佐食賔客佐尸食者孔云大夫士於私人中擇賢者為之知天子當於來聘卿大夫擇之也詩卷阿疏擇佐食亦在尸未入前士佐食一大夫二疑卿四諸侯六天子八也士大夫禮主人迎宗人儐天子尊知不親迎據燕禮以膳宰為主人釁廟禮以宰夫攝主人知此當以小宰攝也大夫士再拜賔三拜衆賔攝主禮亦如之納夏亦九夏之一君特揖正賔汜揖衆賔右立賔及佐食書虞賔在位舜典虞也賔丹朱詩我有嘉客亦不夷懌商頌之嘉客先代後振鷺于飛于彼西雝我客戾止亦有斯容周頌後我客二王之後夏之杞殷之後宋傳天子不以公為賔諸侯不以卿為賔為疑也明嫌之義也賔入中庭君降一等而揖之禮之也燕義必吳紱云祭祀禮大恐未可以燕禮例之先代後且豫戒之愚按諸侯朝覲有時未必四時之祭必杞宋特來助祭也若止圻内諸侯則凡與祭者皆戒之申戒之矣且立尸天子不以公為尸則此所立之賔恐與泛來助祭不同則臨時立賔可也議禮者酌之司宫筵於奥司几筵設席天府陳宗器乃迎尸祝迎尸門外小祝從掌祧以先公先王遺衣服授尸於次先公鷩冕先王衮冕尸入奏肆夏祝延尸王降立阼階下祝先入門右尸入門左賔佐食皆避位天府奉沃盥鬯人進鬯小祝沃尸盥尸升自西階祝從王升自阼階尸入於太室太祖主東面尸南面凡昭主南面其尸西面凡穆主北面其尸東面若禘則太祖所自出無主虚位東向其尸南面太祖主當宧穾之間西面其尸北面冡宰贊王授玉几祝負北墉南面立王出立阼階上西面賔復位佐食立於中庭參周禮儀禮加敷席之法在地一重曰筵筵上者曰席司几筵天府皆上士宗器若赤刀大訓之類掌祧奄人皆宗伯之屬肆夏亦九夏之一祝主接神故迎尸延尸皆以祝詔相在前曰延尸入門左將就西階也祝亦上西階而入門右避尸盥也槃匜在門之右尸尊不就盥故天府奉之室東北隅曰宧東南隅曰穾几長五尺博二尺髙尺二寸按大全言禘祭嚳東向稷西向朱子文集嚳東向稷南向此從大全蓋配之義有二一訓合以皇妣某氏配是也一訓對以始祖配是也若稷南向則降於昭之班而不可言對矣又按士禮祝設几筵大夫司宫設筵祝設几諸侯司几筵設席其几筵司徒贊君設之也又大夫禮宗人三人奉盥右迎尸記陳其宗器設其裳衣中庸禘祫昭穆各用一尸逸禘祫禮四按時祭太祖尸一祧廟尸二親廟尸凡七若二祧未備則五大祫太祖尸一羣昭尸一羣穆尸一凡三大禘所自出尸一太祖尸一羣昭尸一羣穆尸一凡四其親廟四尸各居其廟隋牛𢎞云周人祫享之時旅酬六尸并后稷為七先公昭穆二尸先王昭穆二尸合十一尸丈八之室亦以隘矣恐未考禘祫禮也有男尸無女尸同几天子左右玉几諸侯右彫几周禮司几筵薛氏曰諸侯祭祀隂事右之賔客陽事左之馬融曰几長三尺兩端赤中央黒享先王則衮冕享先公則鷩冕周禮司服則愚謂此分享時若祫祭合一尸而皆衮宗人擯王王階上西面則宗人階下北面王出門西面則宗人從王南面佐食佐賔當事户外南面無事則中庭北面祝釋辭當事在王右無事則北墉下南面此總記執事之異位傳鋪筵設同几為依神也祭統喪祭異几體實不同也廟祭同几精氣合也賈疏皇精氣合故祝曰以妣某氏配君迎牲而不迎尸别嫌也尸在廟門外則疑於臣在廟中則全於君君在廟門外則疑於君入廟門則全於臣全於子是故不出者明君臣之義也祭統君不迎尸所以全尸尊也祝迎尸不拜不敢與尊者為禮也鄭註疑據此則宗伯拜矣樂作黃鍾為宫大吕為角太簇為徵應鍾為羽路鼓路鼗隂竹之管龍門之琴瑟九德之歌九㲈之舞凡九變周禮祭黄鍾人宫也夾鍾為天宫林鍾為地宫黃鍾為人宫天則去地宫祭地則去天宫祭宗廟并去天地兩宫又祭祀去商聲不用蓋黄鍾子律虚危主宗廟故以黃鍾為宫隔八相生則下生林鍾為徵而林鍾為地宫故避之而以林鍾上生之太簇為徵由是下生則南吕當為商而南吕與天宫夾鍾同位避之又商聲不用又上生姑洗為南吕之合亦避之故用姑洗下生之應鍾為羽由是上生則㽔賔當為角而㽔賔為地宫林鍾之配又避之故以㽔賔上生之大吕為角路鼓路鼗前鄭曰二面後鄭曰四面隂竹生山之北者龍門山名九德六府三事之德也㲈韶同虞舜樂右樂作記尸入室乃作樂孔疏傳樂九變則人鬼可得而禮矣周禮夫特牲少牢禮皆不言樂士大無樂也賜乃得用之大夫判縣士特縣其舞大夫四佾士二佾先作樂乃下神下神乃薦獻薦獻訖乃合樂至敬不樂不敢散其志也賈疏按至敬謂祼獻時鄭云禘輕於祫無降神之樂禘王者之大祭豈得言輕熊氏安云大祭皆有三始皆有降神之樂疑熊得之禘有樂而嘗無樂隂陽之義也郊特牲顧孔曰周四時皆有樂殷詩庸鼓萬舞下言予烝嘗是殷嘗亦有樂此云無樂未詳熊曰秋冬但有管絃之樂愚按詩明言庸鼓是熊說亦非也殷人尚聲臭味未成滌蕩其聲樂三闋然後出迎牲聲音之號所以詔告於天地之間也郊特牲三孔曰四時常祭代各有所尚虞尚氣周尚臭若大祫皆先用樂按此豈四時常祭周先祼後樂作歟王降盥小臣沃王盥御僕相盥奉槃授巾王升入太室祼大司冦奉明水大宗伯涖鬯鬱人詔王祼太宰贊王小宰贊太宰酌圭瓚獻尸祝命祭尸祭之啐之奠之祼畢王出復位據周禮參詩疏禮疏明小臣上士四人御僕下士皆太僕之屬水取於月者大司冦奉之司冦秋官清明之至也鬯暢也𢷬鬰其中芬香條暢故謂之鬯又加鬱焉乃謂之鬰鬯圭瓚以圭為柄黃金為勺青金為外而朱其中酒入口曰啐右初獻尸不飲記天子鬯諸侯薫大夫芑蘭士蒹庶人艾王度記諸侯孝道備賜以秬鬯白虎通義賜圭瓚然後為鬯未得賜則資鬯於天子王制典瑞祼圭有瓚以肆先王典瑞中士宗伯之屬肆朝踐也祼行於朝踐時甸師共茅甸師下士天官之屬茅以縮酒鬯人共鬯器鬱人共祼器肆師築鬻祼器有彛有舟築鬻𢷬鬰金而煮之也司尊彛掌六彛春祠夏禴祼用雞彛鳥彛秋嘗冬烝用斚彛黃彛追享朝享用虎彛蜼彛皆有舟並周禮雞鳥鳳也彛鳥彛皆刻而畫之斚為禾稼黃為黃目蜼禺屬仰鼻而長尾兩則以尾塞其鼻二彛一盛明水一盛鬯酒舟尊下臺也傳獻之屬莫重於祼祭統加明水報隂也郊特牲黃目鬱氣之上尊也黃者中也目者清明之氣也言酌於中而清明於外也同上周人尚臭灌用圭璋用玉氣也同上亦玉氣温潤是用氣玉以象德金以配情芬香條暢以通神靈玉飾其本君子之性金飾其中君子之道合天下之極美以通其志也其惟圭璋秬鬯乎白虎通義革金可從可通乎人情禘祭未毁廟各於其廟祼之鄭註犆按此則春礿亦各於其廟祼之若祫則羣尸㑹於太廟以次受祼禘亦四尸以次受祼后入亞祼用璋瓚内宰贊后尸祭啐奠如初祼畢后出入於西房同上從半圭曰璋孔曰后祼二獻也右亞獻尸不飲濬按灌地以求神於隂尸啐之奠之丘氏家禮儀節盡傾茅沙盆疑與古不合又此二奠在主席疑正祭畢乃徹傳君與夫人交獻以嘉魂魄是謂合莫禮運各人死則魂魄散然魂陽魄隂以其氣為感君陽夫人隂是亦所以合之也易嘉㑹以合禮后不與則大宗伯攝周禮有婦人生育之事與其私喪也詩左右奉璋鄭箋亞祼卿士奉之愚按周禮酒人共五齊三酒以役世婦某氏曰世婦助后祭則酒奄十人共世婦在廟之役疑后祼當三夫人贊后九嬪世婦贊夫人不當使左右奉此或大宗伯攝祼時歟王出廟迎牲子從宗伯贊王卿大夫士序從牛人共其互與其盆簝以待事據禮記周禮牛人中士地官之肉屬互懸肉格盆盛血祭器簝受籠也右迎牲傳既祼然後出迎牲致隂氣也按薛氏禮圖后亦出迎牲愚謂婦人無門外之事牲非后事也疑不當出祝迎尸出於室太祖之尸户外當户牖之間南面其主在其右東面尸主異席昭尸西面北上其主南面穆尸東面北上其主北面若禘則自出之尸南面無主虚位東面太祖之尸北面其主西面后薦朝事之豆八韭菹醯醢昌本麋臡菁菹鹿臡茆菹麇臡籩八䵄蕡白黒形鹽膴鮑魚鱐外宗佐薦據孔疏及周禮南户在室之東南牖在室之西户牖之間堂正北也凡菹長切之四寸昌本菖蒲根菁蔓菁茆鳬葵四者皆可為菹醯肉汁也有骨曰臡無骨曰醢凡作醢臡必􅈩乾其肉莝之雜以梁麯及鹽漬以美酒塗置甀中百日乃成熬麥曰䵄麻曰蔶稻曰白黍曰黒形鹽築鹽為虎形也膴䐑生魚為大臠鮑糗乾之出江淮鱐乾析之出東海王者備物近者腥之逺者乾之右后薦朝事豆籩孔氏序次如此薛氏禮圖尸出在獻毛血下后薦豆籩在王三獻下更酌之記室尸主同席室狹也堂尸主異席堂寛禮得備也室主為主尸在其左堂尸為主主在其右室主相向堂尸相同周禮將祭川衡供川奠澤虞供澤奠獸人供死獸生獸􅈄人供鱻魚薧魚掌畜供卵鳥鼈人供蠯蠃蚳以授醯人場人供果蓏甸師供野果蓏籩人供籩實醢人供豆實醯人供齊菹醯醬鹽人供苦鹽散鹽腊人供腊脯膴胖庖人供好羞宰夫以法式戒具川衡下士澤虞上士場人下士皆屬地官獸人􅈄人庖人中士鼈人腊人下士籩人醢人醯人鹽人奄為之皆屬天官掌畜下士屬夏官川奠魚鱐蜃蛤之類澤奠芹蔆茆芡之類鱻鮮同薧乾也蠯蜯嬴蛤也蚳蟻子可以為醢有核曰果桃李之類無核曰蓏𤓰芋之類苦鹽出解池水得風以成散鹽出東海煮之乃成腊乾者脯潤者膴在膺胖在背也后不與則大宗伯攝而薦豆籩外宗贊宗伯必以外宗豆籩固婦人之職也男女得相授器祭嚴無嫌也禮非喪祭不相授器傳水草之菹陸産之醢小物備矣三牲之俎八簋之實美物備矣昆蟲之異草木之實隂陽之物備矣凡天之所生地之所長苟有可薦莫不咸在示盡物也祭義夫人薦豆執校執醴授之執鐙明男女之别也祭統者校豆中央直鐙足下跗也執醴者亦兼執豆彼執鐙以授夫人而夫人受時執校以薦雖親授猶為有别乎爾牲入王執靷牽牲穆答君大司冦前王卿大夫奉幣士執芻封人歌舞充人贊至庭麗於碑以幣告奏昭夏據禮記周禮故穆王太子也父昭則子穆故謂子為穆牲入將殺之用大司冦前重刑也明無故不敢殺也芻以藉牲體歌舞以道其牲之美充人下士屬地官麗猶繫也碑在中庭之南昭夏亦九夏之一右納牲詔於庭鄭曰用幣告神而後殺傳奉牲以告曰博碩肥腯謂民力之普存也謂其不疾瘯蠡也謂其備腯咸有也王南面親射牲射人贊王王從碑北待之卿大夫袒助王殺王執鸞刀毛牛尚耳太僕贊祝出受血毛入告神於室王復位參國語周禮禮記詩雅下周禮夏官司弓矢供射牲之弓矢射人大夫司馬之屬時太宰太僕射人俱贊王射牲鸞刀刀有鈴者右血毛詔於室記牛一豕一羊一謂之牢按天子六牲則馬雞犬亦當於此殺之凡廟一牢毁廟之主昭一牢穆一牢據孔疏引逸禘祫禮凡牢之数視其尸傳天子以犧牛諸侯以肥牛大夫以索牛士以羊豕曲禮肥犧牛色純則不必盡純矣犧牛肥牛皆在滌三月索則不必三月矣楚語云牛羊必在滌三月犬豕不過十日天子郊禘必射牲自射其牲諸侯宗廟之事必自射其牛刲羊擊豕國語逸言射牲則牲無不射也烝嘗禮有射豕是天子羊豕皆射也諸侯射牛則羊豕不射矣天子郊禘必射牲宗廟秋冬射春夏否賈疏不秋冬射時殺也春夏否時生盡殺也然此亦指羊豕而言牛則必射親殺致孝養也大夫士不親殺避君也天子諸侯殺於門内之庭大夫士殺於門外避君也賈疏取其毛告純也取其血告殺也詩毛傳毛血告幽全之物也告幽全之物者貴純之道也郊特牲内幽謂血全謂毛純外皆善毛尚耳貴聰也欲神之聽之也孔疏割刀之用而鸞刀之貴貴其義也聲和而後斷也郊特牲大司冦奉明火祝取膟膋燎於爐入詔神於室出墮於主前據周禮及孔疏於明火取於日者不於尸主而虚位則曰神右祝詔於室一燔燎記合蕭焫之未有黍稷但以膟膋焚之使神知牲已殺甸師供其蕭周禮傳明水火隂陽之精氣潔之至也刑官奉之刑秋也清明之氣也言聖人之自潔而以潔於人也周禮疏燔燎報陽也郊特牲燔燎羶薌見以蕭光以報氣也此教衆反始也祭義稷羶薌亦馨香也牛羊曰羶香黍曰馨香因物異文耳見謂光之著見鄭讀覸非人有氣而後有形故報氣所以教衆反始王袒執鸞刀割肝祝洗於鬱鬯蒙之以膋入燔於室出王親宰之奉於主前拜尸答拜尸嚌之王拜尸答拜據郊特牲及孔疏全宰割也割之而不離右宰祭記君親制祭禮器侯陸佃曰天子曰宰祭諸曰制祭别尊卑也傳君再拜稽首肉袒親割敬之至也敬之至也服也拜服也稽首服之甚也肉袒服之盡也郊特牲尤稽首首稽留於地而後起拜以致敬而稽首服之甚親割致祭而肉袒尤服之盡祭肝貴氣主也同上應肝屬木氣至則木先之故為氣主祝升牲首於室置之北墉下據孔疏儀以下節次皆據孔疏而文則取散見者實之右牲首記羊人祭祀升羊首周禮牲賈曰據此則三首皆升知地官牛人升牛首冬官豕人升豕首愚意馬犬首亦當升之五官升首而言祝者以告神者祝也傳升首報陽也郊特牲諸陽前隂後首在前陽之㑹也尊者尚氣也鄭註氣氣陽血隂口者之所出納祝出又薦血據孔疏薦按前薦血於室此薦於堂前所之血埋之此則後食之右再薦血傳血祭盛氣也郊特牲後孔云此堂上制祭薦血腥時也然則血再薦矣王袒執鸞刀割牲解之太宰太僕贊王司士助王割諸子正六牲之體肩髀胉皆二脊一凡七既割司士羞俎陳諸俎薦尸主前王拜尸答拜王退據周禮少牢大司士諸子皆下夫夏官之屬前足為肩後股為髀肩髀間為胉胉即脅也右薦腥記郊禘之事則有全烝國語全烝升也牲體而升之按此則禘祭牲不體解大祫時祭則必解矣郊血大饗腥禮器血孔疏郊先薦大饗血腥同薦崔氏靈恩曰郊以燔柴為始宗廟以祼為始社稷以血為始小祀以疈辜為始愚按宗廟再薦血社稷五祀降神時先埋血崔特據迎尸正祭而言國語言禘全烝則大禘薦腥以全者薦之歟既薦司士帥其屬復體解之肩為三曰肩曰臂曰臑髀為四曰髀曰肫曰胳曰觳脊為三曰正脊曰脡脊曰橫脊脇為三曰代脇曰正脇曰短脇正脊前曰膉再薦之據孔疏脊居上故以上正為正脇居旁故以中為右薦肆記肫曰􅈩膉曰脰記異名也七體曰牲解再解之曰體解孔疏牲孔曰大夫士以薦熟為始故有解無體解又曰體解而後爓之既薦爓之小司冦實鑊水既爓薦之去脾若膉凡三者七據孔疏其爓沈牲於湯使半熟也髀不薦近凥惡穢也膉不薦近刀傷惡其汙也右薦爓記雍爨在廟門外東南西面牛羊豕魚腊爨南順北上少牢馬按天子尚當有雞犬之爨詩執爨踖踖小雅也踖踖敬傳腥肆爓腍祭豈知神之所饗也主人自盡其敬而已矣郊特牲醴腍熟也孔云或進腥或進解剔或進湯沈或進煮熟按此是腥肆再薦爓祭祭腥而退敬之至也祭義目按此則必有禮文節之詳而今不可考矣王以玉爵酌著尊泛齊獻尸太宰贊王尸拜受王拜送尸祭酒啐酒賔長以脯從尸嚌之加於菹豆上卒爵王拜祝受尸爵尸答拜據孔疏參周禮儀禮下玉爵受一升上為觶身為爵形有底著尊受五升漆赤中無足泛齊酒初成而滓上泛也按獻必有從特牲禮初獻賔長以肝從二獻三獻兄弟以燔從天子宰祭既用肝疑不當以肝從周禮量人制從獻脯燔之數是天子初獻從以脯也右三獻尸飲一記酒正辨五齊曰泛齊醴齊盎齊緹齊沈齊三酒曰事酒昔酒清酒以實八尊酒貳齊不貳五齊三酒詳各節下貳益之也酒正中士冡宰之屬酒飲諸臣故有益齊奉神故無益鬱齊獻酌醴齊縮酌盎齊涗酌凡酒修酌鄭曰獻讀莎謂以鬱金煮鬯摩莎之出其香汁縮以茅泲之而去其糟涗以清酒和而泲之修讀滌以水和而泲之也春祠夏禴用兩獻尊秋嘗冬烝用兩著尊追享朝享用兩大尊俱周禮讀獻阮氏逸曰為犧畫牛為飾鄭曰讀莎刻為鳳羽其状莎莎然亦受五斗似著尊而有足大尊太古之尊上脰微狹脰下微濶平底亦受五斗傳祭齊加明水報隂也郊特牲明水涗齊貴新也凡涗新之也其謂之明水也由主人之潔著此水也同上之五齊皆濁以明水泲乃清明水固取其潔要亦心之潔著於此水也奉酒醴以告曰嘉栗㫖酒謂其上下皆有嘉德而無違心也左傳后以玉爵酌著尊醴齊獻尸内宰贊后内賔從其他如王禮同上涗醴猶體也謂酒成而滓汁相將也其涗以清酒之按大夫三獻則亞獻内兄弟從天子九獻宜内賔從内賔諸侯公卿之妻皆是右四獻尸飲二記𤣥酒在室醴醆在户禮運齊醴即醴在户之内醆即盎齊在户之外醴醆以獻薦其燔炙同上炙燔燒肉炙肝皆以從獻者君與夫人交獻此上公禮王與二王後同君親制祭夫人薦盎郊特牲君此侯伯禮侯伯朝踐君無三獻故制祭夫人即薦盎孔曰上公有醴齊侯伯無醴止有盎故夫人即薦盎尸始飲一若子男則君夫人皆不獻尸猶未飲鬱人及量人受舉斚之卒爵而飲之周禮士量人下司馬之屬陸氏佃謂卒爵在尸飲二王四獻時愚意初獻亞獻尸皆未飲三獻以水涗泛齊猶未成乎酒也四獻以清酒涗醴齊始成乎酒矣而尸或不能飲則不能卒爵而神之餘又不可棄故使鬰人量人受而飲之尊神之餘體尸之意而後之獻亦可深淺於其間蓋以鬱人主鬯而量人主劑量多寡之數故也傳薦以黍稷間以俠甒加以鬱鬯以報魄也教民用愛也祭義之氣陽魄隂故求隂者皆以報魄有魄則可愛養故教民用愛王退乃合烹君就東廂西面祝就西廂東面避如食間仿遷廟禮尸待熟烹且少休也陸氏佃曰適於小幄以待右合烹記内饔掌宗廟祭祀之割烹烹人掌共鼎鑊以給水火之齊周禮屬内饔中士烹人下士皆天官鑊以煮牲及魚腊既熟乃升之鼎齊謂多寡生熟之數傳然後退而合烹體其犬豕牛羊實其簠簋籩豆鉶羮禮運羊諸侯三牲牛豕上公四牲加犬天子六牲則又加馬與雞也簠簋以盛黍稷下將用之籩豆饋食所用者此亦謂上公禮孔云諸侯於饋食即有鉶羮天子至繹祭乃設之天子肆獻祼饋食禮卷上
