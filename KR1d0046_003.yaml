body:
  text: 天子肆獻祼饋食禮卷下宗人府丞任啟運撰繹祭第五繹尋繹也尋繹昨日之祭以儐尸也鄭氏曰大夫禮小故同日以事名曰賔尸天子諸侯禮大故别日又别名曰繹明日遂繹祭夙興祝佐食百官子姓復於廟位以俟右復位傳繹又祭也夏曰復胙商曰肜周曰繹爾雅胙肉也復胙復用昨日之胙也肜亦肉也言肜者肜肜祭不絶也書髙宗肜日按復胙及肜之名是夏殷繹祭不别牲繹祭之明日也公羊傳繹旦日之享賔也榖梁傳天子諸侯曰繹大夫曰賔尸士曰宴尸何休說儀孔曰賔尸以賔禮事尸也士無賔尸禮禮下大夫無賔尸禮者即于室内為加爵上大夫室内事尸三獻禮畢别行賔尸禮於堂鄭曰卿大夫既祭而賔尸禮崇也卿大夫有賔尸則正祭末無陽厭以此薦俎之陳有祭象亦足以飫神也天子諸侯禮備故有陽厭又有賔尸愚按特牲禮終無宴尸之說何氏不知何據王至止於廟門外西塾之基后入於東房將有事於祊故王不入廟孔謂廟門外西夾室之堂是也劉氏謂為内塾之基似悞右王后入廟傳門側之堂謂之塾爾雅間按門凡五東二間為東夾室西二間為西夾室又於其脊中分之向南者曰外塾向北者曰内塾也門堂三之二室三之一考工記除廟屋丈尺未詳大約廟五間東西兩夾室以中三間為堂堂之後為室與房門堂即以東西兩間夾室為堂是門堂得正堂三分之二而又分堂後三分之一為室也餘詳宫室考士絲衣爵弁升門堂視壺濯及籩豆降往於基告濯具於王又視牲告充於王又舉鼎冪告潔於王據絲衣詩傳士宗伯之屬濯溉也充肥也右視濯省牲詩絲衣其紑載弁俅俅自堂徂基自羊徂牛鼐鼎及鼒孔疏云弁爵弁士服也天子官多所以不使服冕者繹之禮輕也若正祭則小宗伯視濯滌詩愚按朱子於詩序斥其誕改為祭而飲酒之則天子他祭無使士省牲視濯者故今引用仍据小序王迎牲親牽之不親殺據祭義疏輕不親殺繹禮也右殺牲傳大夫禮小賔尸仍正祭之牲天子諸侯禮大别日又别牲鄭傳牛按鄭據周禮牛人供享求牛鄭言享牛正祭所用求終也終事之牛繹祭所用愚謂享牛在滌三月者求牛求得即用所謂帝牛必在滌三月稷牛惟具者求訓為終雖見爾雅但指求牛為繹祭之牛亦不甚確后奠壺尊之盎齊以待獻據祭義著不用灌尊神猶在也不用尊之泛齊醴齊繹輕也右后奠盎傳君牽牲夫人奠盎皇謂盎以洗牲孔曰洗牲之說無據熊氏曰繹祭君牽牲時后預設盎齊之尊以待獻若正祭設盎不於此時卿大夫相君命婦相夫人齊齊乎其敬也愉愉乎其忠也勿勿諸其欲其饗之也祭義愉齊齊整一之貌愉婉順之貌勿勿志有所切而不自必之貌明發不寐從而思之故繹祭之初意象如此祝薦血毛於室據祭義疏牲室塾之室鄭云君牽為薦血毛右薦血毛繹祭非専為神故不親殺然祭於祊則猶有神事焉故鄭云君牽牲為薦血毛也若他賔禮則并不牽牲遂合烹并燅昨日之俎參少牢曰不薦腥肆爓繹祭禮輕也鄭繹主賔尸非専為神也燅昨日之牲將以為賔俎也愚按尸與侑之俎則今日新殺者右合烹薦熟於祊之室王入室再拜稽首祝致辭王又再拜稽首出佐食闔户牖如食間祝告利成於王右薦熟以上祊祭傳為祊乎外禮器門言外别於内之祊也孔曰繹祭在門不在廟鄭曰既設祭於室後事尸於堂詔祝於室而出於祊此交神明之道也祭統祭詔祝於室謂昨日正出於祊謂今日繹祭也楊方達云繹主於接尸無取於求神鄭孔謂有二祊謬愚謂記言饗而致之又從而思之思神也非思此為尸之人也則不得謂繹無取於求神也王入廟賔有司皆從王入於廟王立於阼階下宗人請侑王曰命某為侑宗人南面戒侑侑少進禮辭反命又命之侑再拜稽首宗人反命侑出俟於廟門之外據少牢參燕禮之侑以佐尸為勸也右立侑記議侑於賔以異姓辭曰請子為侑傳曰必用異姓以廣敬也待於外當與尸更入主人興禮事尸極敬心也按禮不言侑幾人疑當每尸一侑辭曰請子為某尸侑其出入升降當各隨其尸也司宫筵於堂户西南面又筵於西序東面尸與侑北面於廟門之外西上祝迎尸尸揖侑偕入及庭王降迎尸拜尸答拜王升自阼階尸侑升自西階王東楹東北面拜至尸侑西楹序北面東上答拜據少牢略變之席堂廟堂也户西尸西序侑席太祖尸南面昭尸西面穆尸東面太祖尸之侑西序東面疑昭尸侑南面穆尸侑北面席各隨其尸之右橫設之少牢禮主人出迎宗人儐此王尊故不出迎也少牢禮祝不與儐尸故宗人儐此方祭於祊祝在廟故知必祝迎也王迎尸答拜王拜為尸非為侑也拜至侑亦拜與偕至也右尸侑入傳尸門外北面執臣道也賔尸而尸益卑也王賔客尸而迎之王益尊也鄭傳廟門外西上統於賔升堂東上統於席也孔疏賔孔氏曰為者在門西東面北上今尸并不敢為賔而居臣道故北面是尸益卑也正祭時王不迎尸以伸尸之尊至此迎之以尸同於賔客是王益尊也之愚按尸者神之所憑也有其憑之必有其離憑之則神離之則人也憑之則吾祖吾父離之則吾子吾臣也然既已憑之敢遂以為臣子乎故賔尸者處乎神與人之間者也始猶疑於神之終則全乎人之者也而其間又有異焉士之尸未出廟未出廟則疑乎神未離之故尸不與乎旅酬尸尊也大夫賔尸尸出廟而復入尸出廟而復入則疑於神既離之故尸亦與乎旅酬尸卑也若天子諸侯則尸且出廟而越宿矣士尸出而後陽厭欲神留此厭飫以與人離也大夫尸出不陽厭而遂賔尸若曰苟其未厭則此薦俎亦足飫神矣是亦離之之漸也天子既陽厭矣而於繹又祊焉祊不用尸明乎神既離之也既祊而後迎尸明乎神既離之也尸升堂不入室明乎神既離之也故大夫迎尸門外賔客而尸北面禮敵也不全乎臣之猶恐未盡離之也王迎尸不於門外而尸亦北面賔而且臣之疑乎已盡離之也故曰王彌尊尸彌卑也乃設饌升牲右胖於尸俎左胖於侑俎羞牛羞羊羞豕各以其官不備六牲繹禮輕也尸右胖而侑左胖以右為尊也凡體載皆橫之鄭云正祭縮之以尸為神變於生人也繹祭橫之以尸為賔客從生人禮也凡於俎為橫則於人為縮右設饌記設祭於室設饌於堂鄭云既設祭於室亦事尸于堂脊按大夫賔尸凡四俎尸俎右肩臂肫胳臑正一脡脊一橫脊一短脅一正脅一代脅一侑俎左肩肫正脊一脅一主人俎左臂脅一脊一主婦俎左臑脊一脅一是四俎共一牲也天子禮大疑與尸侑别牲或尸侑取諸今日新殺之牲天子與后取諸昨日左胖之未薦者歟大司馬羞牲魚授其祭周禮橫之加膴少牢祭孔氏曰正縮載進鰭此異於正祭又不全同生人之禮也王設玉几薦玉爵小宰贊太宰太宰贊王尸北面拜受王東楹東北面拜送尸祭酒后薦豆尸取菹㨎於醢祭之又祭䵄蕡祝取黍稷授尸尸祭黍稷祭肺適席未坐啐酒興坐奠爵拜告㫖執爵興王答拜尸取俎徧祭之降筵北面於西楹西坐卒爵執爵興坐奠爵拜王東楹東答拜小宰以爵奠於篚據少牢疑按大夫降階親洗天子尊小宰洗而太宰酌也豆之品未詳疑賔尸降於正祭同加豆也先祭䵄蕡正祭未及也又祭黍稷於六穀為貴也呉紱謂繹祭疑無黍稷愚謂内則常食亦具黍稷恐無賔尸獨去黍稷也之理大夫尸卒爵主人親受之天子尊疑亦小宰受之右王獻尸加爵一按賔尸視正祭皆加爵也故鄭曰不賔尸者即於室内為加爵記周禮太宰贊玉几玉爵小宰贊玉幣之事按少牢禮正宫設几於筵上不親授賔尸乃親授周禮天官大祭祀贊玉几玉爵是正祭即親設几也意大夫避君故至繹祭乃設歟后亞獻内宰取玉爵於篚授外宗於房中外宗洗后出於房外宗實爵后尊南西面拜獻尸尸拜於筵上受后於王席北西面拜送爵薦鉶羮及糗餌腵脩立於王席北西面尸左執爵祭糗祭脩祭鉶祭酒啐酒嘗鉶執爵興坐奠爵拜后答拜尸坐卒爵拜后答拜據少牢爵前小宰受奠於篚故内宰取之少牢禮主婦洗后尊不親洗也鄭曰拜於尊南由便也孔云尸拜席上婦人不為賔主也鄭曰正祭無鉶羮此設之為飲酒也正祭有黍稷此無之禮殺也右后亞獻加爵二記周禮内宰后祼獻贊瑶爵凡賔客之獻皆贊内宗贊王后之獻君獻尸夫人薦豆祭義祭鄭云此繹祭時若正時則薦豆乃獻王命獻侑侑西楹西北面拜受攝主在其右北面拜送内宰薦菹醢䵄蕡司馬薦俎侑登筵祭如尸降筵自北方西楹西坐卒爵執爵興坐奠爵拜王答拜據少牢知侑卑於尸王不親獻后不親薦也周禮大賔客則大宗伯攝而載祼是宗伯得攝主也后不與則宗伯攝亞獻是宗伯得攝后也燕禮膳宰為主人是宰夫亦得為攝主但王與后不在則冡宰大宗伯攝王與后在則冡宰大宗伯不攝為疑也然則此時王與后皆在廟意小宰攝王内宰攝后歟右王獻侑后命内宰獻侑如之據少牢禮主人獻侑主婦乃獻尸及侑鄭曰婦人禮從便故連之也天子禮大不宜從便又后不親獻侑則獻尸必在其前故進后獻尸於王獻侑上右后獻侑司宫設王席於阼按大夫禮尸酌乃設席此先設席王尊也大夫席於東序此於阼王尊也尸受侑爵降洗侑降立於西階西東面避尸也王降立阼階東小宰以王命辭洗王不親辭王尊也尸洗升王升尸酌酢王太宰受尸爵尸西楹西北面拜送王答拜太宰奉王爵王祭卒爵太宰受爵授小宰王拜尸答拜尸親嘏王王拜尸答拜據少牢參賈疏人孔曰特牲禮主人獻尸尸即酢主人主乃獻祝佐食彼尸尊欲達已意也少牢禮賔尸待主人獻侑乃酢主人此尸卑達主人之意欲得先進酒於侑乃自飲故也愚按天子禮尸彌卑宜并達后意欲先進於侑故序在此右尸酢王周禮膳夫徹王之阼俎據此知王席在阼也記凡賔客酢王之事太宰於賔客處受而奉王王飲畢太宰受爵以授小宰賈疏此賔尸尸亦賔也據知太宰受爵以授小宰也詩令終有俶公尸嘉告其告維何籩豆静嘉令終謂繹祭乃正祭之終事有俶謂王及后獻又繹祭之始事也公尸嘉告尸親嘏王也正祭命祝嘏此親嘏者賔尸而尸益卑也按詩鄭箋以既醉篇為繹祭細玩之良然故此悉據之后致爵於王王在阼筵上西面拜受后阼階上王席西北面答拜王不告㫖其餘如尸禮據少牢爵孔曰特牲禮三獻止乃致爵此未三獻已致爵正祭已獻尸故不待三獻也主與婦拜易位者拜尸侑在王席之北此避并敬尸侑故在席西也不告㫖酒固王有之也如尸禮王尊也誠按此一節先儒不言天子諸侯禮異同愚細思之亦不能有異但大夫席東序君席阼階微異耳后酌自酢左執爵拜王答拜坐祭立飲卒爵内宰受后爵后拜王答拜據特牲意后自酢達王也右后致爵於王自酢傳大夫内子不自酢避君夫人也士妻亦自酢卑無嫌也司宫設后席於西房南面先設席后亦尊也尸降筵受内宰爵后入於房立於席西待尸酢也尸降侑亦降侑亦降以從尸也少牢禮主人亦降代内子辭洗也王禮尊知王不降尸易爵於篚洗升侑升立西楹西俟尸酌也尸酌内宰受爵傳内宗后出於房南面拜受尸於侑東北面拜送后入於房飲於房中之俎出立卒爵執爵拜尸答拜内宗受后爵傳内宰后入於房尸侑就筵據少牢后少牢禮大夫内子西面拜避君夫人也此后南面拜尊也少牢禮主人立東楹東主婦立主人席此卒爵王禮尊知王不與后偕也立而卒爵執爵而拜皆變於男子也又按大夫士無西房故其妻出東房西面拜后夫人在西房故出房南面拜右尸酢后周禮内小臣徹后之俎鄭云后受尸爵飲於房中之俎羊按大夫禮主人受尸酢長賔設羊俎司馬羞肉主婦受尸酢司馬設羊俎其餘以次設之則天子諸侯牛俎必司徒設之且天子備官知各以序設之也記酢必易爵士尸酢主婦不易爵孔曰避内子也卑按他禮皆大夫避君士得與君同獨此士避大夫大夫不避君所謂放而文者也傳尸酢夫人執柄夫人受尸執足明男女之别也祭統與按他禮夫人多后同各居一國逺無嫌也獨此夫人與后異夫人與尸親授受后不親授受知不親授受者以尸酢王有太宰之受爵王不親受則后可知且后獻尸不親授更可知矣王致爵於后后房中筵上拜受王西面房外答拜其餘如王禮王更爵酌亦自酢后拜王答拜坐卒爵拜后答拜據特牲也后王答已王爵于王即酌自酢達王之意不敢煩爵於后亦酌自酢夫婦之義其體敵也后自酢先拜達王之意如受王賜也王自酢亦后先拜尊王之答已如更受賜也且酢宜致之者也右王致爵於后自酢傳夫婦相授受不相襲處酢必易爵明夫婦之别也祭統乎夫婦親者也何嫌爾雖無嫌猶示别也君子興敬為親也大夫不致爵於主婦避君也士致之卑無嫌也王命獻祝席户外南面拜受攝主拜送内宰薦菹醢佐食設俎祝徧祭卒爵拜攝主答拜愚按此攝主宜小宰為之以下凡攝主皆小宰右王命獻祝記尊者舉觶卑者舉角按士禮尸祝佐食皆用角此王禮獻祝佐食宜玉爵傳先獻祝以常接神尊之也鄭傳后命獻祝祝拜受如王禮此攝主宜内宰為之以下凡攝后皆内宰右后命獻祝王命獻佐食有司設席兩階間佐食北面拜受攝主拜送佐食坐祭卒爵拜攝主答拜右王命獻佐食記執事之俎陳於兩俎間特牲獻佐食俎即設兩階間少牢食按少牢禮正祭獻祝佐皆有俎賔尸祝有俎佐食無俎天子諸侯正祭未獻祝佐食知此獻佐食必有俎也傳次獻佐食以執事為勞也后命獻佐食佐食拜受如王禮右后命獻佐食上賔洗爵升酌獻尸尸拜受爵賔西楹西北面拜送爵尸奠爵於薦左賔降少牢禮獻不即舉者禮成於三且俟賔之王不欲先舉尸彌卑也右賔三獻加爵三通正祭言則繹祭皆為加爵就繹祭言則此三獻猶為正爵也詩朋友攸攝攝以威儀攝猶代也正祭王三獻而此賔三獻是攝王也王世子入獻尸北面再拜送尸答拜尸卒爵世子拜尸答拜尸酌酢世子拜尸答拜世子卒爵拜尸答拜右王世子獻尸加爵四詩威儀孔時君子有孝子孝子不匱永錫爾類孝子王世子也既按詩既醉篇毛傳云者盡其禮終其事鄭箋云禮謂旅酬之屬事謂施恵先後及歸俎之類成王祭宗廟旅酬下徧羣臣至於無筭爵莫不醉焉又賔筵篇孔疏云王世子不止正祭舉奠天子諸侯子孫别有獻尸禮則即此二詩反覆玩味而當時行禮次第亦大略可覩矣王適孫入獻尸如世子禮無適孫則適庶子攝適庶子世子之同母弟也右王適孫獻尸加爵五詩其類維何室家之壼君子萬年永錫祚𦙍𦙍子孫也謂孝子又有孝孫也錫爾純嘏子孫其湛其湛曰樂各奏爾能錫爾純嘏謂尸酢王而嘏即所謂公尸嘉告也子孫見尸嘏王故喜樂而各進爵謂之能者尸尊而子孫能獻之是其能也朱子曰謂子孫各酌獻尸尸酢而卒爵知子獻孫又獻即所謂孝子不匱永錫祚𦙍也按虞喜言有適子者無適孫顧炎武云冡子身之副也家無二主亦無二副唐髙宗有太子復立太孫非矣然則未立太孫者無二副之義而世嫡相承之序已於此黙寄之歟賔就阼致爵於王太宰小宰贊王如受尸酢禮據少牢王席在阼故就之賔不敢拜於西階而就王者王尊而賔卑也賔酌自酢拜王答拜據孔疏右賔致爵於王自酢按少牢禮主人先獻賔酬賔賔乃獻主人大夫尊故避王也特牲禮賔先獻主人主人乃獻賔士卑無嫌也據此則王禮賔獻王及后自當在獻賔前賔房外之西致爵於后内宰贊后受如王禮賔酌自酢拜后答拜按后亦尊獻王於阼知獻后亦就房外也右賔致爵於后自酢按少牢禮賔不獻主婦大夫妻尊避君夫人也特牲禮賔獻主婦士妻卑無嫌也據此則王禮賔必致爵於后尸作三獻之爵司馬羞魚俎尸取膴祭之祭酒卒爵奠爵拜賔北面答拜據少牢俟作起也猶舉也前賔獻奠而未舉賔獻王及后乃舉之大夫不備官故司士羞魚俎此言司馬據周禮也膴腹下厚肉右尸作三獻之爵按特牲禮三獻作尸止爵士賤則尸尊尸尊故賔請之乃舉也大夫尊則尸卑尸卑故不待賔請自舉之據此則王彌尊尸彌卑知尸必自作也按此一條亦大夫不避君士異大夫賔受尸爵酌獻侑侑拜受賔北面答拜司馬羞魚俎侑祭卒爵拜如尸禮賔答拜據少牢右賔獻侑尸降筵受賔爵酌酢賔賔西楹西北面拜受尸在其右授之尸升筵南面答拜賔坐祭遂飲卒爵拜尸答拜執爵降實於篚據少牢不尸親酢賔由右授尸卑也祭拜遂卒爵禮殺也右尸酢賔傳尸不即酢俟獻侑乃酢之遂賔意也侑受獻不酢賔禮彌殺也賔獻祝如初禮右賔獻祝賔獻佐食亦如初禮右賔獻佐食王命獻賔設席西階上賔升受爵拜攝主在其右答拜坐祭卒爵執以興坐奠爵拜執爵興攝主答拜酌自酢坐奠爵拜賔客拜坐祭卒爵拜賔答拜賔取祭降右王命獻賔記賔尊俎設於西階上凡獻有脯醢有折俎賔祭肺禮畢執祭降奠於其位宰夫執薦以從設於祭東司士執俎以從設於薦東傳成祭於上尊賔也取祭以降反下位也賔卑不敢酢自酢達賔意也鄭傳攝正祭王拜此惟主拜尸卑賔亦卑也詩執爨踖踖為俎孔碩或燔或炙按特牲禮主人獻尸賔長以肝從主婦獻尸兄弟以燔從主婦致爵主人一獻而肝燔俱從鄭云凡獻佐食皆無從是長賔及祝有俎有從衆賔佐食有俎無從矣王命獻公如賔禮若有羣公者以次升如賔禮右王命獻公按王不以公為賔而以卿為賔為疑也以卿為賔則獻亦先賔尊賔也然公雖不為賔而爵尊於賔故異之先於衆賔也長兄弟入獻尸侑北面拜自酢皆如賔不拜既爵無從既卒也卒爵不拜禮殺也有俎無從禮殺也從謂燔炙右長兄弟獻尸侑加爵六又酌獻王自酢皆如尸禮右長兄弟獻王又酌獻后不自酢餘如王禮不自酢婦人禮殺也右長兄弟獻后又酌獻祝如賔獻祝禮無從不獻佐食不獻佐食兄弟禮殺也右長兄弟獻祝按少牢禮大夫兄弟不獻主人避君也據此知王禮兄弟必獻王及后也特牲禮主人獻兄弟兄弟乃獻尸祝致爵主人及主婦士卑故主人先獻兄弟也據此知王尊必長兄弟先獻王及后也王酬尸小宰洗太宰酌贊王王東楹東北面拜尸西楹西北面答拜坐祭遂飲卒爵拜尸答拜王先自飲以導尸小宰受爵降洗尸侑降小宰洗而尸降尸彌卑也洗升尸升侑不升鄭氏曰侑不從尸禮益殺也太宰酌尸受爵拜王反位西面答拜尸北面奠於薦左未舉侑升據少牢反王東楹東北面拜賔之禮敵也位西面拜非敵也王彌尊尸彌卑也右王酬尸加爵七此酬之始廟按特牲禮士不酬尸尸未出猶全乎尊故不敢與酬也少牢禮大夫酬尸尸既出廟而復入不全乎尊故賔之與相酬也據此則王尸出廟越宿復入知必與之相酬也尸侑各就筵羞者薦羞於尸侑及王與后内羞皆右之庶羞皆左之據少牢庶孔曰内羞在右隂也羞在左陽也右薦羞詩君婦莫莫為豆孔庶為賔為客傳繹而賔尸及賔客也毛傳所莫莫清淨而敬至也豆以盛内羞庶羞言為豆甚多故自尸及賔客皆有之也鄭曰正祭夫人先薦豆君後獻繹祭君先獻夫人後薦豆是先後異也少牢禮賔尸宰夫設内羞司士設庶羞孔氏詩疏言正祭時賔用之為薦其言君婦者推本言之謂豆先於祭時豫作非謂祭時君婦薦之是后夫人不親薦也然孔氏禮疏言后薦朝事之豆饋食之豆而朱子詩傳言豆盛庶羞内羞主婦薦之是又后夫人親薦也愚謂正祭之豆后夫人親設之繹祭之豆宰夫司士設之若賔用為薦意惟九獻後之庶羞耳又按正祭時賔客無豆繹乃設之蓋以内羞庶羞皆為飲酒設故至旅酬乃用也王命獻衆賔攝主不自酢餘如賔禮不酢禮殺也右王命獻衆賔記俎設於其位王命獻卿其長一人升受獻不拜既爵主不自酢餘以次升坐祭立飲不酢而降不拜既爵猶坐飲也立飲則禮又殺矣右王命獻卿記尸飲五君洗玉爵獻卿此上公正祭時之禮其俎皆設於其位不於階上禮又殺也祭按臣工詩鄭箋諸侯助畢即遣之歸不從繹祭以禮輕也若有留者其受獻當在諸卿上皆從公禮蓋以命數論則侯伯七命卿六命子男五命似子男當在諸卿下然子男外君陽爵宜從伸卿内臣隂爵宜從屈也論者裁之傳至於衆賔升受坐祭立飲不酢而降隆殺之義辨矣鄉飲酒義推此亦可例尸舉奠爵拜王東楹東答拜卒爵拜王答拜右尸舉酬太宰受尸爵酌奉王以次酬衆尸尸不止爵徧王復位右王酬衆尸尊兩壺於階間先尊東方加杓南柄次尊西方亦如之又尊兩壺房中西墉下南上據特牲及尊兩壺於階間為酬賔兄弟設也尊兩壺於房中為酬内賔及内兄弟設也杓所以酌者不用𤣥酒主於味也右設旅酬尊記澄酒在下澄沈齊也酒事酒昔酒清酒也酬行神恵也不酌上尊卑異之也鄭傳獻嚴正故酌上尊酬禮䙝不敢與神靈共尊也大夫不設尊避君也士卑得與君同也孔疏神士尸未出廟故曰靈天子繹祭於尸但賔之而已而必别尊者酬恵將徧之於下不可同於所尊也意其所設者亦罍尊歟設尊先東方恵由近也王命酬賔攝主酌西方之尊西階上北面酬賔賔在左主在右主奠觶拜賔答拜主坐祭卒觶拜先自飲以導賔賔答拜主洗觶賔辭主對卒洗酌西面賔北面拜主奠於薦北賔西面坐取觶還東面拜主北面答拜賔奠觶於薦南揖復位右王命酬賔傳酌先西方尊賔之義也凡奠者於左舉者於右奠於左非不舉也行神恵不可同於飲酒之義也於薦南明將舉也乃設觥據詩罰觥兕觥所以失禮者右設觥詩兕觥其觩㫖酒斯柔不吳不敖胡考之休孔曰至施酬而設觥變於正祭也旅酬之前無可罰至旅而獻酬交錯或恐失禮宜於此設之大夫賔尸不設觥者禮小即以祭日行事未宜有失也立司正據詩法司正察儀之官右立司正詩凡此飲酒或醉或否既立之監或佐之史賔筵之詩凡此飲酒承上射與祭而言蓋祭至旅酬客有失禮者故立司正以察儀法猶設觥意也王命獻宗人如衆賔儀宗人宗伯之屬周禮有都宗人掌王子弟有封邑及公卿大夫有采邑者之禮家宗人掌諸侯之大夫有食邑者之禮故少牢特牲禮皆有宗人相大夫士之禮猶大宗伯相王之禮也但天子禮大而節煩非宗伯一人所能相小宗伯肆師以下皆有事焉大宗伯之獻列於卿則小宗伯以下受獻宜在此蓋以禮官特别異之也右王命獻宗人記宗人之獻齒於衆賔王命獻長兄弟於阼階上如賔儀按此時王西面立獻主及兄弟拜皆北面右王命獻長兄弟記其俎設阼階上祭訖執以降傳酬賔乃獻兄弟者獻之禮成於酬先成賔禮故也鄭傳王命獻衆兄弟如衆賔儀右王命獻衆兄弟記其俎皆設於其位周禮凡賜爵司士呼昭穆而進之傳凡賜爵昭為一穆為一昭與昭齒穆與穆齒此之謂長幼有序鄭曰齒謂衆兄弟也孔曰獻時不以昭穆旅酬乃以昭穆君賜爵即若酬之愚按如孔說則前獻長兄弟此獻衆兄弟必以爵之尊卑為序未以齒也兄弟二人入舉觶於尸及侑洗觶升實爵西楹西北面東上坐奠爵拜執爵興尸侑答拜坐祭遂飲卒爵執爵興坐奠爵拜亦先自飲以導尸侑尸侑答拜皆降洗升及位尸侑皆拜受爵二人拜送據少牢右兄弟二人舉觶於尸侑加爵八此正酬之始侑奠觶於右未舉右侑奠觶傳凡奠者於左舉者於右此未舉奠於右行神恵不可同於飲酒之義也按燕飲之禮奠酬有不舉者君子不盡人之歡宗廟之酬無不舉者神恵不敢虚也獨大夫少牢禮侑此奠觶不舉侑以輔尸故舉觶必并及於侑尸觶舉以酬主人侑觶無可行也王禮旅酬時止有一人舉觶於尸則意侑於此時舉以酬侑歟詳見後尸遂執觶興北面阼階上酬王王在右坐奠觶拜王答拜不祭立飲卒爵不拜既酌酬王王拜受尸拜送尸就東階王尊也不祭不拜既禮殺也立飲尸從賤者禮王禮彌尊尸彌卑也右尸酬王尸就筵王以尸觶酬侑西楹西侑在左太宰執爵王拜侑答拜王立飲卒爵太宰酌授侑王復位侑拜受王答拜王亦立飲從尸禮也復位乃答拜王彌尊也右王酬侑侑以王觶升長賔酬之如王酬侑禮侑於西階上賔在其左右侑酬長賔長賔升次賔酬之以次徧右長賔酬衆賔王命獻大夫及公有司如衆兄弟儀公有司升受降飲降飲禮卑也右王命獻大夫及公有司記尸飲七以瑶爵獻大夫公有司門西北面東上獻次衆賔按公有司亦執事者如舉鼎匕載之類本在士中而先得獻者以有執事貴之也孔云天子諸侯之大夫準士之公有司亦門西北面東上則大夫於尸飲七受獻而公有司次之可知矣王命獻内賔内兄弟於房中據特牲不殊其長爵徧乃自酢疑内宰就房外拜獻内賔内賔三人房中同答拜獻内兄弟内兄弟三人同答拜内宰退其酬爵奠未舉右王命獻内賔内兄弟不殊其長略婦人也鄭傳末賔酬宗人如侑酬賔儀據鄭傳右末賔酬宗人王賜兄弟爵司士呼而進之長兄弟升次兄弟酬之以次徧右長兄弟酬次兄弟傳凡賜爵昭為一穆為一昭與昭齒穆與穆齒此之謂長幼有序按特牲禮於賔有酬於兄弟無酬故以兄弟子舉觶為酬之始王於兄弟有賜爵則以賜爵為酬之始也王於賔使人酬之尊而疎於兄弟呼而進之親之也周道親親於此可見前獻時以爵至此乃以昭穆齒衆兄弟酬及佐食以次徧右衆兄弟酬佐食宗人酬公有司佐食酬私人以次徧卒飲者實爵於篚孔曰後雖無所行酬亦自飲訖右公有司私人以下徧記宗人於旅齒於衆賔佐食於旅齒於兄弟公有司於旅齒於宗人私人於旅齒於佐食孔氏曰天子諸侯之士凖士之私人亦門東北面西上愚按諸侯之大夫入天子之國皆曰士則諸侯之大夫以聘問來者得與於祭皆名私臣其位與天子之士齒列門東也其賢者擇之為佐食孔云獻食則在前賢賢也旅則於後從其黨也愚按雖從其黨猶以賢勞在衆私臣先也宗人以上飲於西階上大夫以下升受下飲據大夫少牢禮兄弟飲於上私人飲於下推之按此酬尸與尸酬在西者賔與賔酬宗人與宗人酬公有司與公有司酬在東者兄弟與兄弟酬佐食與佐食酬私臣與私臣酬東西分行一黨畢乃及一黨乃薦庶羞於賔兄弟内賔兄弟下及私臣右薦羞於賔以下傳其薦羞為飲食也有庶羞無内羞賤也后舉旅於内賔内兄弟外宗内宗以次徧據鄭傳爵按王以酬舉旅后則自舉疑亦内宰贊酌也右后舉旅於内記内賔立於尊之北東面南上宗婦北堂東面北上東房半以北曰北堂凡席東向西向以南方為上内賔南上如常禮也宗婦亦東向而北上者后北堂之北南面統乎后也按此亦當酬一黨畢乃及一黨如堂下之儀衆賔之長一人舉觶於尸爵不止衆賔之長乃衆賔中之長者非長賔也右賔一人舉觶加爵九此旅酬之始太祖尸發爵行旅不受旅昭酬穆穆酬昭以次徧末尸自飲卒爵而止右尸旅酬傳旅酬六尸曽子曰周禮其猶醵與鄭曰旅酬使之相酌也后稷之尸發爵不受旅合錢飲酒曰醵旅酬相酌似之發愚按此一條殊不分明鄭所云使者不知誰使之豈太祖尸自飲而使昭穆六尸相酬歟兄弟酬賔且待子弟舉觶豈尸尊而有自酌之禮歟考少牢禮有衆賔之長一人舉觶於尸爵不止又賔一人舉觶於尸如初疑先一人舉觶於尸在此時為旅酬始後一人舉觶為無筭爵始大夫禮避君無交行之酬故略之而井屬一時也又按天子酬禮凡有三一直行為正酬一交行為旅酬一錯行為無筭爵前後直行錯行皆自尸始無縁中間交行獨從賔與兄弟始之理據鄭云太祖尸發爵又云六尸相酌則交行而為旅酬之始明矣故斷屬此又本節孔疏言后稷尸在室西壁餘自文武二尸親廟四尸凡六在后稷尸東南北相對愚按天子諸侯正祭有室事堂事之分士不賔尸故旅酬時尸在室而不與乎旅酬大夫賔尸則尸在堂而與乎旅酬天子諸侯賔尸於堂無縁旅酬尸得在室疑孔説悞也侑取前奠觶行酬亦昭侑酬穆侑穆侑酬昭侑以次徧末侑自飲卒爵而止右侑旅酬按此條諸禮無文但旅酬無一人不及必無侑不與酬之禮而六尸昭穆相酬又無從及於侑因思前兄弟二人舉觶於尸侑尸觶既行侑觶未行此賔一人舉觶於尸不及侑必以侑有觶未行故也則此時太祖尸發爵六尸相酬亦必太祖之侑發爵六侑相酬矣兄弟之弟子洗酌於東方之尊阼階前北面舉觶於其長奠於薦南長兄弟還西面奠於薦北餘如攝主酬賔儀據特牲之階以下謂前右兄弟弟子舉觶於其長傳旅酬下為上所以逮賤也此時長賔有奠觶主不酬長兄弟長兄弟無奠觶無以相酬故弟子舉觶然後行旅長賔取薦南之奠觶阼階前北面酬長兄弟長兄弟在其右賔奠觶拜長兄弟答拜賔立卒觶酌於其尊東面立長兄弟拜受觶賔答拜揖復位據特牲尊其尊東階之也右長賔酬長兄弟長兄弟取賔觶西階前北面酬衆賔長衆賔長左如初長兄弟卒觶酌於其尊西面立受旅者拜受長兄弟北面答拜揖復位據特牲其尊西階之尊也右長兄弟行酬衆賔長行者達於下也衆賔長取觶酬次兄弟於阼階禮率初右衆賔長酬次兄弟長兄弟取薦北之奠觶酬長賔禮率初薦北之觶弟子所舉者右長兄弟報酬長賔報者以為反也長賔行酬次兄弟禮亦如之次兄弟報酬衆長賔禮亦如之以次徧禮盡如之右賔及兄弟相酬以徧王命獻士及私臣不升階於其位其餘如大夫儀於其位禮彌卑也右王命獻士及私臣記尸飲九以散爵獻士及羣有司皆以齒按同姓兄弟序以昭穆親親也而同昭穆之中以爵為序獻以爵酬以齒於親親之中亦兼貴爵之義焉異姓諸臣序以爵貴貴也而同爵之中受獻與酬卿與卿齒大夫與大夫齒士與士齒及羣有司皆以齒於貴貴之中亦兼尚齒之義焉此先王之禮所為仁與義兼至也凡獻必有俎傳凡為俎者以骨為主殷人貴髀尚質故貴髀之厚周人貴肩尚文故貴肩之顯凡前貴於後據周言之貴者取貴骨賤者取賤骨貴者不重賤者不虚示均也俎者所以明恵之必均也故曰見政事之均焉祭統羔豚而祭百官皆足太牢而祭不必有餘此之謂稱也禮器之羔豚用小祀太牢用之大祀夫祭有逮煇胞翟閽者恵下之道也祭統者煇鄭讀䩵甲吏之賤者胞肉吏之賤翟樂吏之賤者閽守門之賤者祝宗人旅齒於衆賔佐食旅齒於兄弟禮如賔兄弟相酬以次徧宗人亦大夫佐食亦士孔云佐食受獻在賔前以接神貴之也受旅齒於兄弟接神將終仍從其官也據此則祝受旅當在賔之下宗人之上右宗人佐食相酬以徧大夫公有司旅齒於宗人士私臣旅齒於佐食禮亦如之以次徧卒飲者實觶於篚右大夫士及公有司私臣相酬以徧按此酬尸以昭穆相酬賔兄弟以東西相酬宗人與佐食相酬大夫與士相酬公有司與私臣相酬皆東西往來所謂交也衆賔之長又一人舉觶於尸如初據少牢右賔又一人舉觶加爵十此無筭爵之始詩賔載手拘載再也謂再舉觶拘㪺同酌之也太祖尸發爵昭酬穆穆酬昭無筭爵筭數也飲視其量不為限制也右尸無筭爵尸及侑侑相酬亦無筭爵前尸酬不及侑别之也人之乎猶未盡人之也此尸酬遂及侑盡人之無為復别也右侑無筭爵按此酬尸得及侑故亦衆賔之長一人舉觶賔弟子兄弟弟子各舉觶於其長奠皆於薦右餘禮皆率初其爵皆無筭右賔弟子兄弟弟子舉觶無筭爵傳前之酬也奠於右舉於左行神恵不可同於飲酒之義也兹之酬也奠於右即舉無筭爵漸同於飲酒之義也宗人佐食公有司私臣爵皆無筭遂之於下遂之于下煇胞翟閽亦得飲焉右無筭爵及下徧詩獻酬交錯后夫人内賔宗婦房中亦無筭爵以徧右無筭爵房中徧按此酬不以爵不以齒隨其量之能飲與情之夙好而相酬焉所謂錯也無筭爵無筭樂右無筭樂傳升歌三終笙入三終間歌三終合樂三終遂合語拜善言右合語記於旅也語儀禮傳凡祭合語之禮皆小樂正詔之於東序合語謂稱說先王之善道小樂正樂師也東序東學名合語有威儀小樂正豫教之詩禮儀卒度笑語卒獲書禹拜昌言辭敢不夙夜以求從祝䂓按孔疏言君賔尸堂上而堂下别尊故旅酬無筭爵並行大夫不敢與君禮同故堂下亦與神靈共尊不行旅酬但行無筭爵而已士禮堂下得獻之後與神靈别尊故旅酬無筭爵並皆行之士賤不嫌與君同故得禮備也愚按士禮雖得與君同然多放而不致者故必兼少牢禮及他書推之然後其節文略可見佐食洗散獻於尸尸酢佐食散容五升畫以雲氣右佐食獻尸加爵十一詩室人入又室人佐食也祭時有事於室故謂之室人不按孔疏惟言士大夫加爵二天子諸侯禮大止此又言天子禮大佐食亦為加又言四時之祭及禘祭正祭九獻祫祭十三獻愚反覆思之參互考訂知正祭九獻而止若大祭則合長兄弟衆賔長衆兄弟及嗣子舉奠為十三也繹祭連正祭言則通謂之加爵又别言之則王與后二獻為正餘九獻為加蓋正祭重在正故正爵九繹祭重在加故加爵九也傳宗廟之祭貴者獻以爵賤者獻以散此以小為貴也禮器最爵受一升小佐食獻祝祝受祭酒奠之不既爵右佐食獻祝傳佐食獻無從禮殺也祝不既爵禮將終也佐食獻不及王禮殺也鄭傳王降阼階下尸出侑從衆賔從王不送祝送不出門按大夫禮拜送尸廟門外王不送者尸在廟門外則疑於臣賔尸之事既終則全乎臣也不送所以明君臣之義也右尸出詩鼓鐘送尸神保聿歸鼓鐘尸出入奏肆夏也神保尸之嘉號言常為神憑依也保猶依也不按大夫正祭祝告利成尸乃出賔尸尸出祝告者孝子之利養為神非為尸也賔尸既終則尸全乎人非神也故不告也士禮旅酬無筭爵尸乃出亦告利成者尸未出廟不與乎旅酬則猶神之也王尸既出廟其與於酬也詳且乆焉賔尸既終非特人之直臣之矣楚茨之詩鄭以為王禮朱子以為公卿有田禄者則朱子為當蓋王朝之公卿其爵雖視侯伯而近天子則壓而不伸故禮有視諸侯之大夫者有視諸侯之士者如言濟濟蹌蹌絜爾牛羊則不親殺也避王也工祝致告皇尸載起則告利成在尸將出其不賔尸猶士禮也若夫鼓鐘送尸樂具入奏其禮皆非諸侯之大夫士所有蓋其爵本尊故也惟於屈伸進退之間一一思其故則禮之所以然可識矣祝命佐食徹尸俎佐食乃出尸俎於廟門外有司受歸之佐食徹而有司歸尸尊也司士歸侑俎歸賔俎亦歸之尊之次也其公有司以下則自徹以出自徹卑也祝命徹阼俎豆籩設於東序下徹庶羞設於西序下此將用以燕宗族者祝佐食各執其俎以出此將用以燕宗婦者右徹俎詩諸宰君婦廢徹不遲諸宰膳宰也為冡宰之屬故謂之諸宰君婦主婦也王后不親徹九嬪徹豆籩而已卿大夫則主婦親徹豆籩不遲以疾為敬亦不留神恵之意也孔曰祭末嫌其惰慢故以疾為敬周禮膳夫徹王之阼俎按大夫禮祝命佐食徹王禮則祝命之佐食涖之膳宰徹之記凡祭於公者必自徹其俎曲禮若鄭云此謂大夫以下卿以上則使人歸之愚謂王禮大夫亦當使人歸之遂以薦羞及尸祝之庶羞燕宗人於寢右燕宗人詩諸父兄弟備言燕私鄭曰異姓既歸賔客之俎同姓則留與之燕所以尊賔客親骨肉戚戚兄弟莫逺具邇或肆之筵或授之几鄭曰王與族人燕兄弟之親皆揖而進之年稚者為設筵而已老者加之以几肆筵設席授几有緝御設席重席也亦為老者設之愚按賔或單席而酢也緝御鄭曰惇史也亦為老者設之或獻或酢洗爵奠斚醓醢以薦或燔或炙嘉殽脾臄或歌或咢孔曰王與族燕則以異姓為賔宰夫為主人既設几筵族人升堂受燕乃立賔主人獻之賔卒爵酢主人主人卒爵又酌以酬賔賔受奠之不舉鄭曰斚殷爵用殷爵尊兄弟也孔曰賔主皆非兄弟而言尊兄弟者賔主為兄弟而有之其器之設皆為兄弟也正薦用醓醢并韭菹嘉殽則脾與臄又作樂助歌以燕樂族人是王能内睦之也臄函也即舌也或曰口上曰臄下曰函敦弓既堅四鍭既鈞舍矢既均序賔以賢敦弓既句既挾四鍭四鍭如樹序賔以不侮毛曰敦弓畫弓也天子雕弓鈞愚謂矢強弱與弓調也賢多中也不侮敬也朱子曰射以中多為雋以不侮為德按大射主於射故未舉旅則射燕禮主於飲酒故旅酬後行之此亦燕而先射者備賔禮使早出也吕祖謙曰射雖畢而燕未終舉觶無筭爵獻酌尚多故言酌大斗祈黃耉於既射之後曾孫維主酒醴維醹酌以大斗以祈黃耉孔曰賔射既中可以助行養老曾孫於是承先王之法度為主人以養老焉愚按老不能射於是觀其勝負以為樂是所以助養老也埤雅曰燕賔則膳夫為主此曽孫為主則以尊事黃耉所以為厚也愚按此當在賔讓而止之後湛湛露斯匪陽不晞厭厭夜飲不醉無歸湛湛露斯在彼豐草厭厭夜飲在宗載考鄭曰此燕同姓諸侯也下二章燕異姓及二王之後文不録記祭於廟燕於寢詩疏以朱子曰凡廟之制前廟以奉神後寢藏衣冠按此寢廟寢也即詩所謂在宗載考也燕禮註以為路寢豈此燕在廟寢臣之燕則於路寢歟鄭云燕於堂蓋寢之堂也燕宵則兩階及門庭設大燭儀禮於燕禮庶子執燭阼階上甸人執大燭於庭閽人為燭於門外公與族人燕則以異姓為賔膳宰為主人世子記故孔曰燕飲必有禮儀獻酬交錯宜立賔以行禮但使族人為賔則賔禮疎隔非親親之道公欲與族人親故以異姓為賔也而賔必與王相對君尊不敵故又以膳宰為主人使得執禮酬酢若與異姓燕則以宰夫為獻主公與父兄齒族既不為賔公又不為主故公與族人相齒見親親也族食世降一等並世子大孔曰齊衰之親一年四㑹食功三小功二緦麻一於異姓讓則止同姓則成之鄭箋非異姓舉酬則止所謂過三爵禮也族燕則不醉無歸傳燕毛所以序齒也中庸此前序昭穆猶兼序爵至乃専以齒序篤親親也復愚始於此常疑異姓既歸賔客之俎似不宜與此燕又疑先飲後射射而又燕非窮日之力不足行之此祭末之燕為時或無多思之十年乃得其說蓋此賔乃取於姑姊妹之夫禮所稱父之黨非卿非外諸侯以内賔例之可知也其節文次第則行葦詩盡之蓋此燕以盡私恩非為賔客故詩先言戚戚兄弟其禮主於養老故即言授几緝御酢即行射禮故止言獻酬奠斚異於賔筵之舉酬在射前燕止以薦羞及尸祝之庶羞故止言醓醢燔炙異於伐木之肥牡肥羜燕重在娛老故賔主甫獻酢而已或歌或咢異於舉旅而後樂作賔之射亦所以娛老故但於賔之中序以賢序以不侮而不於賔主之不勝者行罰爵獻賔以膳宰為主賔讓而出即王自為主故詩遂言曽孫惟主凡旅酬必設兕觥以懲不敬此燕止以明恩故惟言酌以大斗然則此燕雖略與燕臣同而其所異者亦從可想矣大約王席在阼階西向父兄席在王之右南向弟子在階下北向賔席在父兄之右中堂南向司宫先設同姓之席宗人請賔王曰命某為賔始設賔席也宗子有事族人皆侍已侍於賔奠然後燕私不醉而出是無親也醉而不出是渫宗也渫慢也伏生書作是不敬也故曰飲而醉者宗室之意也徳將無醉族人之志也書大傳以祝籩豆燕内賔及宗婦於房據特牲疏人内賔不歸之俎婦禮略也右燕内賔及宗婦按有内賔則亦宜有外賔而外賔之所取亦可知矣鐘師奏燕樂右燕樂詩樂具入奏以綏後禄鄭曰燕而祭時之樂皆入奏於寢孔云燕祭不同樂而云皆入者歌咏雖異樂器則同也愚按鳬鷖詩傳祭之明日繹而賔尸之樂鄭曰首章賔宗廟之尸二章賔四方百物之尸三章賔天地之尸四章賔社稷山川之尸五章賔七祀之尸是各祭之繹止用其一章也然此一詩只可用之王酬尸若尸酬王必又有詩朱子以假樂為尸答鳬鷖理或然也其餘若賔致爵於王兄弟獻王必皆歌一詩則大雅自文王而下猶多受釐陳戒之辭或者隨其人所取耳有樂必有獻工之禮因未有所據姑闕之俟知禮者補定宗人祝王及陳戒於王右祝戒詩爾殽既將莫怨具慶既醉既飽小大稽首神嗜飲食使君夀考孔恵孔時維其盡之子子孫孫勿替引之按燕必有儀小大稽首其儀之一節也燕必有辭神嗜飲食云云其辭之大略也其他皆無所考或亦可用儀禮諸侯之燕臣推之歟既祭畢祭僕反命於王以王命勞有司百官之敬者誅其不敬者據周禮之誅謂責讓右既祭而誅賞傳卿大夫贊君命婦贊夫人各揚其職百官廢職服大刑明堂位使使頒胙於二王後及有功諸侯及兄弟之國據左傳及周禮右頒胙傳夏之後杞殷之後宋於周為客天子有事膰焉存二代之後以尊賢也周襄王使宰孔賜齊侯小白胙曰天子有事於文武使孔賜伯舅胙齊侯下拜登受左傳比宗廟之胙不及異姓其賜於二王後褒有功也周禮以脤胙之禮親兄弟之國雖不與祭猶賜及之以親親也臣受胙者歸頒之右臣頒君胙記祭於公不宿肉傳助祭於公所得胙肉歸即頒賜不留神恵也朱註食其不以祭之餘也禮餕餘不祭天子肆獻祼饋食禮巻下
