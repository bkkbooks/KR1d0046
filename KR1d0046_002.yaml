body:
  text: 天子肆獻祼饋食禮卷中宗人府丞任啓運撰正祭第四正祭饋熟時也祭以饋熟為正故曰正祭亦曰饋食禮羮定雍人陳鼎正鼎九陪鼎三凡十二六卿皆各舉其職周禮鄭注正鼎羊一牛一豕一魚一臘一腸胃一膚一鮮魚一鮮臘一共九陪鼎臐一膷一曉一共三愚按六牲馬屬冡宰牛屬司徒雞屬宗伯羊屬司馬犬屬司冦豕屬司空諸侯有司徒無冡宰故有牛牲無馬牲有司馬無宗伯故有羊牲無雞牲有司空無司冦故有豕牲無犬牲天子六官備則六牲必入正鼎特無文以證之也或曰天子正鼎十二其陪鼎則三牲升右胖髀不升肩臂臑胳正脊一脡脊一橫脊一短脅一正脅一代脅一皆二骨以並腸三胃三舉肺一祭肺三實於鼎升右胖周所尚也髀不升近凥賤也數脊從前數脅從後舉之法也脊脅骨多故皆取二骨以並大夫腸胃不别鼎諸侯則别鼎舉肺一尸食所先舉也祭肺三尸及王與后所祭也膚倫九而鼎魚十有五而鼎臘用麋一純而鼎據少牢膚倫擇也骨剛屬陽陽以隂為用故二骨以並柔屬隂隂以陽為用故倫九而鼎魚水族亦隂故十五而鼎純全也麋則左右胖皆升之或曰鼎俎竒故牲用十一體而膚九魚十五皆竒也雞亦疑九而鼎右陳鼎記鼎各當其鑊孔疏也便於升舉以匕助以畢匕長三尺畢五尺皆以棘雜記注於煮牲於鑊升之鼎又升之於俎皆以匕舉之而執事以畢助之也棘之為言吉也吉祭以棘喪祭以桑桑之為言喪也君子不食圂腴少儀胃豕曰圂其腸不入鼎王出迎鼎鼎序入陳於東方當序西面北上俎設於鼎西西肆肵俎在其北亦西肆宗伯導王及賔盥御僕相王盥賔設心舌載於肵俎王以鸞刀割肺奠於肵俎心舌皆切本末心奠之舌橫之佐食遷肵俎於胙階西乃各載其俎肩臂臑在俎之上端膊胳在俎之下端脊脅肺居其中舉肺一祭肺三皆切據少牢陪鄭曰鼎十二而俎九鼎不可載也或曰天子正鼎十二俎亦十二肆陳也肵俎在正俎北將先載也心舌皆知味者故特先之皆切本末割必正也上端下端載之之法肺前猶未制切以制之右載俎記俎各當其鼎少牢載亦便於也凡為俎者以骨為主殷入貴髀周人貴肩凡前貴於後祭統殷尚質貴其隱者周尚文貴其顯者詩於薦廣牡相豫肆祀周頌傳肵之為言敬也郊特牲北為尸而有肵俎設於饌每尸所食牲體皆置之是敬尸特設此俎饎人告饎舍人實簠簋於堂小宗伯小祝廟門外迎以入大宗伯涖粢舍人實簠簋陳於堂東肆師表粢盛告潔據周禮及賈疏皆饎人奄為之舍人上士皆屬地官表小旗也簠簋有蓋其種陳者難辨故以旗表之右陳黍稷記廩爨在廟門外雍爨之北少牢諸天子侯大夫同惟士爨在西堂下西壁天子之粢六黍稷稻粱麥苽周禮胡苽雕黍曰薌合稷曰明粢稻曰嘉蔬粱曰薌萁曲禮曰秫曰黍其性黏故曰合粳曰稻其性硬故疏粱有黃白二種萁莖也言其莖亦香也孔曰語辭舂人供粢盛之米廩人供其接盛周禮舂人奄為之廩人下大夫皆屬地官接鄭讀扱愚謂如字舂人舂臼畢廩人以米接續之使再舂也玉敦后親設其簋則九嬪執授后后設之賈疏周公盛魯公燾羣公廩公羊傳公盛新舂者燾覆也周有王禮故純用新舂者魯公則半簋以上冒以盛羣公則直用御廩所藏而已按此則天子皆盛而諸侯則或燾或廩也詩龍旗十乘大饎是承商頌侯按此則諸助祭當有奉盛之禮傳天子親耕南郊以供粢盛諸侯亦耕於東郊以供粢盛甸粟而納之三宫三宫米而藏之御廩將祭后夫人親舂身致其誠信誠信之謂盡盡之謂敬敬盡然後可以交於神明也祭統參春秋傳之甸甸師也上言舂人此言親舂意猶天子親耕后三舂夫人五舂嬪七舂世婦九舂而舂人助以卒舂也盛必后親舂者廩則舂人接舂者亦可奉盛以告曰潔粢豐盛謂其三時不害而民和年豐也左傳王北面事尸於堂大宗伯奉粢尸祭賔佐食以次奉六粢尸遍祭太祝授心尸祭心嚌之奠於肵俎小祝授肺尸祭肺嚌之奠於肵俎賔佐食以次奉俎尸遍祭祝告王拜尸答拜略據少牢未嚌味及齒而食右正祭記直祭祝於主郊特牲熟直正也祭以薦為正也祝以孝告禮運辭祝曰孝王某敢以一元大武剛鬛柔毛明粢薌合嘉蔬清滌用薦嵗事於先王以王后某氏配尚饗據少牢參曲禮武牛為牲之最貴故曰一元迹也牛肥則迹大豕肥則鬛剛羊肥則毛柔清滌以明水涗齊也物不能悉舉舉其重者而言傳祭齊加明水報隂也鄭云正祭之時陳列五齊於五齊上又加明水之尊按此時無獻尸尸祭齊之事疑鄭所謂正祭通前後而言謂陳設如此耳祭肺肝心貴氣主也俱郊特牲皆肺氣之管肝氣之母心氣之帥故曰氣主按少牢無祭心心至尊也避君也尸神象也祝將命也郊特牲所使為尸者於祭者子行也父北面而事之所以明子事父之道也鄭曰天子諸侯之祭朝事延尸於户外是以有北面事尸之禮大夫無之文按天子宗廟之祭以此一節為正祭則其節必有委曲周詳者惜無可考姑存其槩而已來陸氏佃曰祝出迎尸尸席自北坐於主北祝又求神於門內之祊據郊特牲又祊廟門內平生待賔客之處使祝求之意神之或在乎此也右索祭記門內之閍爾雅故閍門也以祭焉文又為祊正祭之祊在廟門內繹祭之祊在廟門外西室孔疏詩祝祭於祊傳詔祝於室而出於祊此交神明之道也祭統燎詔祝於室謂燔升首時直祭祝於主索祭祝於祊不知神之所在於彼乎於此乎或諸逺人乎祭於祊尚曰求諸逺者與郊特牲祊之為言倞也同上之倞逺也按言祝祭王在堂不出也然謂祭則亦必有席有俎有獻且既曰求之則必復入而祭之堂若迎而已入者特禮之詳無可復考饋熟乃大合樂據孔疏鎛師鼓金奏之樂笙師共鐘笙之樂磬師奏縵樂大師小師登歌清廟下管象周禮師鎛師笙磬師皆中士宗伯之屬鼓擊晉鼓以奏之鐘笙其鐘與笙相應金奏聲大笙奏聲小縵樂雜聲祭祀備樂故縵聲亦及之此三者以節音之大小正變者也大師下大夫小師上士亦屬宗伯清廟周頌篇名以琴瑟歌之於堂上象樂名商人服象為虐於東夷周公逐之作三象或曰即周頌維清之篇以管吹之於堂下此二者所奏之樂也司干授干司戈盾授兵籥師鼓羽籥之舞周禮朱干玉戚以舞大武八佾以舞大夏祭統屬司干下士籥師中士亦宗伯司戈盾下士則屬司馬武舞用干戈文舞用羽籥此四者舞之器也大武武王樂大夏禹樂此二者所舞之樂也魯祭周公用之若天子必備樂王氏某曰前下神用一代之樂此薦神備六代之樂旄人舞四夷之樂東夷曰昧南夷曰任西夷曰侏􅍣北夷曰禁鞮鞻氏吹而歌之周禮牛旄人鞮鞻皆下士亦屬宗伯旄尾持以舞者鞮鞻革屨右大合樂記鼓人以路鼓鼓鬼享鼓人中士屬地官路鼓鼓四面者奏夷則歌小吕舞大濩以享先妣奏無射歌夾鍾舞大武以享先祖俱周禮薑大濩湯樂先妣謂嫄先祖自后稷以下聲莫重於升歌舞莫重於武宿夜祭統師皇甫説武王至商郊停止宿夜士卒歡樂歌舞以達旦因以名曲凡樂升歌三終笙入三終間歌三終合樂三終升歌在堂上笙入在堂下間歌堂上一歌堂下一吹相間而作合樂堂上堂下一齊並作凡舞武用干戚文用羽籥其佾天子用八諸侯用六大夫四士二服氏虔曰每佾八人諸子正舞位授舞器周禮司兵司戈盾各授舞者兵同上屬司兵中士夏官傳樂在宗廟之中君臣上下同聽之則莫不和敬樂記周公升歌清廟苟在廟中常見文王者愀然如見文王焉書大傳升歌清廟示德也下而管象示事也仲尼燕居室周公之勤王臣之事也歌者在上貴人聲也郊特牲下特言管亦貴人氣也鄭傳舞列八以節八音而宣八風左傳歌象德舞象功上德而下功也白虎通義天子之祭也與天下樂之諸侯之祭也與竟內樂之君執干戚就舞位君為東上冕而總干率其羣臣以樂皇尸此與竟內樂之之義也祭義子孔曰天亦親總干愚謂朱干玉戚者以象武王之待諸侯但冕而總干者以象羣后之以師畢會故總干諸侯可用而朱干玉戚則為僣也作四夷之樂於太廟示一天下也鄭傳魯納蠻夷之樂於太廟言廣魯於天下也明堂位此蠻夷南蠻東夷採按傳言以樂皇尸過則尸入室矣故諸書列之此祝薦幣告於室據薛氏禮圖鄭氏孔氏皆未及右薦幣記幣曰量幣曲禮皆謂廣狹長短中度魯廣尺終幅雜記尺幣之制廣二尺二寸長一丈八魯人短小如此非禮甚矣太宰贊玉幣之事小宰贊玉幣之事周禮宰此祝薦當小贊之辭祝曰孝嗣王某敢用量幣告於皇祖某公某王據遷廟禮薦按薛氏薦幣告於室之後言延尸入于室乃熟又言迎尸入室舉奠斚則上尸入乃主入之誤也故繫之此所云薦幣禮文他書莫見姑闕之祝延主復入於室之奧太祖主東向昭主南向穆主北向徙堂上之饌於室中王入室事主王西面祝在左王再拜稽首祝曰圭而為明薦之享王又再拜稽首王出祝以斚爵酌奠於鉶南祝亦出闔户牖如食間如尸一食九飯之頃右事主於室鄭曰是謂隂厭陸氏佃曰厭殤祭之名鄭説誤記天子奠斚諸侯奠角鄭注受斚受三升上畫禾稼角四升上畫雲氣傳入室僾然必有見乎其位周還出户肅然必有聞乎其容聲出户而聽愾然必有聞乎其嘆息之聲祭義隂孔曰此謂厭時孔子曰有隂厭有陽厭曽子問厭也者無尸直使神厭飫之也當奧之幽是為隂厭鄭注君按大夫士先隂厭祝告畢乃迎尸正祭避也士祭畢有陽厭卑無嫌也大夫祭畢有儐尸無陽厭避君也諸侯先陽厭後隂厭别於天子也諸侯徹餕留二簋黍為隂厭則諸侯祭畢乃隂厭而此時為陽厭可知矣陸氏不取厭名其論禮未聞有異祝取腸間脂焫蕭合黍稷再燔燎據孔疏右再燔燎傳曰蕭合黍稷臭陽達於牆屋人死魂氣歸於天形魄歸於地故祭求諸隂陽之義也殷人先求諸陽周人先求諸隂郊特牲再按王與后祼故亦再燎求諸隂陽者必均也前燎無黍稷此加黍稷者前使神知牲既殺此使神知黍稷既陳也孔曰一祭再焫蕭取膟膋升首是朝踐時既奠然後焫蕭合羶薌是饋熟時祝迎尸入於室祝詔王拜妥尸尸答拜舉奠斚祝告尸曰孝饗王拜祝命尸挼祭小祝贊挼祭尸左執斚右取菹㨎於醢祭於豆間佐食取黍稷肺授尸尸祭之祭酒啐酒告旨王拜尸奠斚小祝贊奠尸答拜據特牲恐妥安坐也尸坐未安故拜以安之也挼墮同謂置之豆間也前説饌以飫神今來挼祭祭訖當食神之餘也肺刌肺也其舉肺前已嚌之告旨者達孝子之意唯恐不當於神故告之美明神享也右尸挼祭傳古之君子曰尸亦餕鬼神之餘也祭統祭黍稷加肺祭齊加明水報隂也郊特牲黍孔曰祭稷加肺挼祭時事祭齊加明水總據祭時則此舉奠斚亦當祭而加明水舉斚角詔妥尸古者尸無事則立有事而後坐也郊特牲古謂夏時夏立尸而卒祭殷坐尸周坐尸詔侑武方禮器矣武鄭讀無愚如字言隨也殷坐尸視夏已文而周則不唯坐之且拜以使其安侑以勸其飽隨方所而詔侑之禮益詳矣大夫不告饗不告旨避君也士告卑無嫌也故曰有曲而殺也有摲而播也有順而托也后薦饋食之豆八葵菹螺醢脾析蠯醢蜃蚳醢豚拍魚醢籩八棗乾棗桃桃諸梅梅諸榛栗周禮拍脾析牛百葉豚豚脅也諸菹也右后薦饋食豆籩薛氏此節在五獻下記凡祭男子進俎婦人設豆籩簠簋賈疏婦人之贄腵修榛栗以告虔也左傳王以玉爵酌壺尊盎齊獻尸兄弟以脯從如初禮據孔疏壺尊受五斗上有頸下有足髙一尺六寸盎滃也酒初成而滃滃然蔥白色也右五獻尸飲三記春祠夏禴用兩象尊秋嘗冬蒸用兩壺尊朝享追享用兩山尊周禮曰象尊阮氏逸畫象為飾朱子曰以象骨飾尊山尊聶氏崇義曰刻為山而畫之皆受五斗后以玉爵酌壺尊緹齊獻尸內兄弟以燔從如初禮據孔疏而緹赤也酒成紅赤色也右六獻尸飲四記君親割牲夫人薦酒郊特牲與上公禮王同此侯伯禮侯伯饋熟亦不獻故君割牲夫人即薦酒尸始飲二若子男君與夫人皆不獻尸猶未飲上佐食舉尸牢肺正脊授尸又邇黍於筵上右之王羞肵俎尸祭正脊嚌之加於菹豆佐食以次羞牛鉶羊鉶豕鉶馬從牛雞從羊犬從豕鉶有芼尸扱以柶祭遍祭嘗牛鉶食舉三飯上佐食又邇稷舉尸牢正脅尸祭嚌佐食受加肵俎如初佐食以次羞牛胾羊胾豕胾尸食又三飯上佐食邇稻佐食舉膚舉魚舉臘以次皆如初尸食又三飯上佐食邇粱舉尸牢骼尸又二飯告飽祝西面於王南獨侑不拜曰皇尸未實侑尸加一飯上佐食邇麥舉牢肩尸祭如初不飯告飽王拜不言尸為王又三飯黍尸舉牢肺正脊上佐食受加於肵仿少牢近邇近也之使便食也食舉食所舉也胾堅肉膚軟肉祝既侑仍反南面王侑不言祝復西面代王稱言牢禮始於正脊終於肩終始以尊也六榖黍最貴尸為王復三飯黍亦以尊終也孔曰士於此設太羮此不設者太羮不為神直是為尸士不儐尸故并設之天子諸侯至儐尸乃設也右尸飯尸飯為饋食正禮大夫士無朝事故曰少牢饋食禮特牲饋食禮記士三飯告飽大夫五飯告飽上夫夫七飯告飽諸侯九飯告飽天子十一飯告飽孔曰大名曰食小數曰飯飯一口也士祝與主人共侑大夫以上祝與主人更侑祝侑言而不拜主侑拜而不言賈疏凡侑必以幣詩承筐是將六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼周禮太宰贊玉幣之事同上太此王侑當宰贊之王以玉爵因朝踐之尊酳尸尸卒爵祝受之又酌著尊之醴齊授尸尸酢王王席戶內之東西面受酢王俠拜據孔疏又玉爵薛作玉斚食畢而潄其口曰酳因朝踐之尊故名朝獻長賔又以脯從王先拜送尸卒爵乃答王拜俠猶兩也尸酢王王即拜受尸拜送王既受爵奠之又拜是尸一拜而王再拜也右七獻酳尸又謂之朝獻尸飲五記太宰贊王爵周禮即賈曰此天子加爵也子按侯伯禮至此尸飲三男禮尸飲一上佐食取黍稷下佐食取刌肺授上佐食上佐食授王王左執爵右授肺祭之又祭酒啐酒右王挼祭祝與佐食出盥於洗入佐食取黍摶之以授尸尸執以命祝祝嘏王王奠爵興再拜稽首宰夫受黍以筐祝遍取黍稷牢肉魚臘擩於醢以授尸尸授王王前宰夫受以筐王拜尸答王卒爵鬱人量人受王爵歷而皆飲之據少牢參周禮人歷猶更也更歷而飲之者鄭曰鬱人贊祼尸量制從獻之脯燔其事相成故也右尸嘏王記士出寫嗇於房祝以籩受大夫出户祝以籩受王使宰夫受以筐士尸親嘏大夫以上不親嘏士致爵乃席王受尸酢席司几筵設酢席鬱人大祭祀與量人受舉斚之卒爵而飲之量人凡宰祭與鬱人受斚歷而皆飲之周禮嘏鄭司農曰斚亦爵也後鄭曰斚讀作宰冡宰亦容攝王祭賈曰大夫士祭受嘏後有獻祝及佐食事天子無獻祝及佐食事故有獻鬱入量人之法愚謂本文言受而飲似不得為獻蓋歷瀝通王卒爵而不盡則二人受其餘瀝而飲之也又按祝與佐食於執事為最尊大夫士一獻即獻祝佐食在獻賔前天子之祭於祝於佐食且未獻其餘可知蓋意主於事神未暇及人也辭祝曰皇尸命工祝承致多福於女孝孫來女孝孫使女受祿於天宜稼於田眉夀萬年勿替引之少牢禮詩永錫爾極時萬時億孔曰天子嘏辭多此言其略按此則嘏天子必不僅如少牢禮也姑引之以存其式傳祝以孝告嘏以慈告禮運嘏長也大也郊特牲祝嘏莫敢易其常古是謂大假禮運法常古常行之古易之則矯誣矣假家語作嘉謂大福也王使宰夫受不親受王尊也尸使祝嘏不親嘏尸尊也王受尸酢即席王尊也王洗玉爵獻二王後歌振鷺右獻二王後傳修其禮物作賔王家天子有事膰焉有喪拜焉左傳天子存二代之後猶尊賢也尊賢不過二代禮器恪若陳則三代之後以備三四代以上若焦祝薊則皆臣之詩振鷺于飛于彼西雍我客戾止亦有斯容徹以振羽二王後出即徹其俎歸于其館王洗玉爵獻公歌烈文右獻公傳尸飲五君洗玉爵獻卿祭統上孔曰此據公九獻言之若侯伯則三獻獻卿子男一獻獻卿在君一獻酳尸後按諸侯無公孤則天子獻公當在比反饋樂成薦其薦俎序其禮樂備其百官君子致其濟濟漆漆祭義貌濟濟衆盛貌漆漆光顯君子謂助祭者按此則獻時當有樂詩烈文辟公錫兹祉福惠我無強子孫保之王受尸嘏因言我之受福而子孫保之皆辟公助祭有以致之是兹之錫福者皆辟公惠我也詳詩文意在此王降立阼階南南鄉臣當進爵祿者北面受命史由君右執䇿命之再拜稽首乃出命畢王升階西面立祭統鄭曰命爵祿在一獻酳尸後右因祭䇿命辭臣曰臣敢對揚天子之丕顯休命記臣受書以歸釋奠于其廟傳爵有德祿有功必賜爵祿於太廟示不敢専也祭統乃按此䇿命之常禮若大封賞則特格於廟不因祭時若鄉吏以下則但命於朝不命於廟所謂爵人於朝與衆共之也后以瑶爵因饋食之尊酌緹齊酳尸內宰贊尸易爵酌壺尊之盎齊酢后后拜于室中北面據孔疏璧瑶爵以瑶玉為形飾角口又謂之璧角狀如觶而大受四升亦畫雲氣因饋食之尊故又謂之饋獻內賔亦以燔從右八獻后酳尸又謂之饋獻尸飲六記爵用玉盞仍雕加以璧角璧散明堂位璧玉盞即玉爵王加用玉盞后加以角賔加以璧散魯視王降一等故正爵用玉盞君加以璧角夫人加以璧散也尸酢夫人執柄夫人受尸執足祭統然柄爵之尾若柄也尸尊故親受授受異處猶為有别乎爾傳授受不相襲處酢必易爵明男女之别也祭統后不席無二尊也嘏王不嘏后從夫無二體也王拜西面后北面避王也大夫妻西面避君夫人也士妻拜亦北面卑無嫌也后薦加豆八芹菹兔醢深蒲醓醢箈菹蜃醢筍菹魚醢加籩八菱二芡二脯二修二內宗贊薦周禮深蒲蒲醢入水深者醓以肉汁為醬箈前鄭云水中魚衣後鄭云箭竹笋筍則大竹筍也菱芡屬二角曰菱四角曰芰芡雞頭實右后薦加豆籩記士二籩大夫四籩諸侯六天子八孔疏士宗婦執兩籩於户外主婦受設於敦南特牲禮大夫儐尸婦贊者執二籩麷蕡主婦受奠之蕡在麷東主婦又取糗及腵修設之糗在蕡西少牢禮傳恆豆之菹水草之和氣也其醢陸産也加豆陸産也其醢水物也不敢用常褻味而貴多品所以交於神明之義也非食味之道也賈曰加豆籩后酳尸時用之設孔曰士不儐尸故設兩籩大夫主婦不籩以當日儐尸也天子諸侯明日儐尸故正祭設籩諸侯之為賔者以瑶爵酌壺尊盎齊獻尸尸卒爵祝受尸爵賔以酌罍尊清酒自酢據孔疏山罍木為之飾以金畫為雲之形受一石清酒冬釀而夏成右九獻尸飲七記凡四時之間祀追享朝享皆有罍諸臣之所自酢也傳諸臣酌罍自酢不敢與王之神靈共尊也后又羞籩二糗餌粉餈羞豆二酏食糝食內饔贊薦孔疏但言內饔薦今據薛氏禮圖餌糗餌粉稻米黍米合熬大豆為之堅潔如珥故謂之粉餈亦粉稻米黍米合豆屑為餅鄭曰合蒸曰餌餅之曰餈酏食先鄭言以酒酏為餅後鄭言􅊡也取稻米舉糔溲之小切狼膏以與稻米為􅊡糝食先鄭言菜餗蒸後鄭云取牛羊豕之肉三如一小切之與稻米二肉一合為餌煎之右后薦內羞記內羞在右庶羞在左庶羞羊臛豕膮之類正按薛氏止言后獻內羞而孔氏詩疏言祭賔羞庶豆意此庶羞則賔薦之歟未食曰薦既食曰羞鄭注酳朝事饋食時尸未食故曰薦尸後尸已食故曰羞庖人供祭祀之好羞周禮若鄭曰謂四時所為膳食荆州之鮺魚青州之蟹胥雖非常物進之孝也按此當入庶羞內牛修鹿脯田豕脯麋脯麕脯麋鹿田豕麕皆有軒雉兔皆有芼爵鷃蜩范芝栭菱椇棗栗榛柿瓜桃李梅杏查梨薑桂內則葉薄析曰脯又修治之曰修腥食之時以藿起之而不細切曰軒以菜和之曰芼蜩蟬也范蜂也地生曰芝木生曰栭查果名鄭曰二十二物人君燕食加豆按此亦所謂庶羞也傳祭典有之曰國君有牛享大夫有羊饋士有豚犬之奠按此士亦可以犬祭也庶人有魚炙之薦牲異以辨分也籩豆脯醢則上下共之隨其所取不為别異以致孝也不羞珍異不陳庶侈並國語求雖無等亦不貴異物不太多以禮節之也唯君用鮮衆給而已左傳儐按賈疏上大夫當日尸故正祭不設內羞天子諸侯明日儐尸則正祭設內羞孔氏説亦同但賈于下大夫不儐尸言宰夫羞房中之羞司士羞庶羞于尸祝主人主婦天子賔長受酢後亦當設此內羞庶羞於尸祝及王后則誤矣王不獻祝王與后未交致爵內羞庶羞於何用乎若謂繹祭獻祝致爵王后時則善王洗玉爵獻諸侯之為賔者歌來雍據薛氏八獻受酢後獻賔按賔獻尸為九獻不應賔未獻尸王先獻賔也故移其序右王獻賔詩有來雍雍至止肅肅相維辟公天子穆穆於薦廣牡相豫肆祀假哉皇考綏豫孝子凡牲體皆賔與主人對舉而升之俎言惟此大賔既和且敬以助我之祭祀故皇考享之以安我孝子之心蓋歸德於賔亦猶烈文之意記客出以雍徹唐李善文選注有此蓋今逸也皆按大夫士禮主人於賔祝佐食衆賔衆兄弟親獻而周禮鬱人鬯人二條言受王爵飲之即為獻是王不親獻但使之飲即當獻也夏官司士凡賜爵呼昭穆而進之是王不往獻但呼之使前而賜之爵即名獻也賔于禮為尊不當在使呼之例或使宰夫致爵于賔賔西階上拜受王東階上拜送賔卒爵又再拜歟長兄弟洗觶酌卣尊之沉齊為加爵如賔儀卣尊漆尊也周禮作修沉酒滓下沉也亦作澄正獻之外為加爵右長兄弟加爵十獻尸飲八記玄酒在室醴盞在户粢醍在堂澄酒在下禮運盞玄酒水也醴體齊也盎齊也粢醍以粢釀醍即醍齊也澄與沉同酒三酒也下謂階下祫備五齊禘四齊時祭二齊孔疏追按鄭孔謂祫大禘小故云然愚謂禘所自出不可言小疑禘祫皆備五齊時祭無泛耳彛為上卣為中罍為下孔疏盛彛為上故正祭四齊卣為中故盛加爵之沉齊罍為下故盛諸臣之酢酒也卣有四修蜃概散廟用修山川四方用蜃祼事用概疈事用散周禮不鄭讀修為卣言畫犧象為飾愚謂修卣之名當讀修為卣也蜃畫蜃為飾先鄭云蜃一作模蓋模者摹修之形為之模以形名蜃以飾名一也祼鄭讀埋謂祭山林概飾以朱帶疈辜祭四方百物散尊無飾四者皆漆尊也祫十有三獻禘及四時九獻鄭注小按鄭謂祫大禘小故云然愚謂禘不可言當是禘祫皆十三獻四時則九獻耳衆賔長加爵如長兄弟之儀此衆賔乃助祭之諸侯非佐食右衆賔長加爵十一獻九飲王洗玉爵獻外諸侯之來助祭者歌載見右獻衆諸侯傳王於諸侯不純臣鄭詩箋男按侯伯子來朝王皆賔之其禮有祼是尊之如神明也內卿大夫則皆臣之疑卿大夫未獻外諸侯當得一獻也或但獻而不酢視公禮為稍殺耳詩載見辟王曰求厥章率見昭考以孝以享以介眉夀薄言保之思皇多祜烈文辟公綏以多福俾緝熙於純嘏愚按賔有載牲諸事故曰於薦廣牡餘諸侯無事故但言率見昭考次兄弟為加爵如初爵止爵止尸不飲禮將終故也右衆兄弟加爵十二獻尸不飲三按祫禘十三獻則有此加爵四時之祭無此三加爵止九獻耳嗣子入舉奠北面再拜稽首尸舉鉶南所奠斚授之子受斚拜尸答拜卒奠斚拜尸答拜洗斚獻尸尸拜受子答拜尸卒斚子拜祝受虛斚尸答拜祝酌授尸尸酢子子拜受尸拜送子卒斚又拜降據特牲禮參詩疏右嗣子舉奠十三獻尸飲十記嗣子之班齒於昭穆按此謂無事時將嗣世而齒於昭穆何也父在則禮然無生而貴者也王世子舉斚諸侯世子舉角詩疏傳嗣子舉奠將傳重纍之也鄭傳登餕受爵以上嗣尊祖之道也文王世子父嗣子者之正體大夫之嗣子不舉奠避君也士子舉之卑無嫌也鄭傳後按特牲禮嗣子舉奠在加爵之弟子舉觶之前而詩賔筵疏言天子奠斚諸侯奠角在饋獻前天子九獻後乃舉之又曰祭末乃舉之是時祭九獻後即舉也又特牲疏言時祭九獻祫祭十三獻是九獻不得為祭末當俟三加爵乃舉也但祫通舉奠為十三而時祭舉奠在九獻外者九獻為正爵當止以世子國本不可缺故特繫之也九獻外皆加爵禮成於三則三加爵外必通舉奠數之乃得十三耳又賈疏言因舉奠而獻是士之禮若天子諸侯除此酌入之外别有子孫獻尸禮按子孫獻尸於此無所屬疑在繹祭之中其詳見後尸卒食祭廩爨饔爨用黍肉無籩豆特牲記也饔熟肉右祭爨記宗婦祭饎爨烹人祭饔爨特牲士饎飯也無廩故曰饎爨天子諸侯有御廩則曰廩爨傳夫奧者老婦之祭也盛於盆尊於瓶禮器中鄭曰奧當作爨字之誤也廟尸食竟乃祭之按古者蘇伯吉利之妻名摶頰死托於爨是為先炊孔曰其神卑賤故但盛食於盆盛酒於瓶與祀竈禮異也以尸享祭爨有功也鄭注又祭爟禮亦如之據周禮右祭爟記司爟凡祭祀祭爟周禮屬司爟下士司馬傳報其明之功也鄭注祭用之必報之類按禮不言爟何時以其相次王出東階下西面祝出西階下東面告利成於王王諾祝入復告於尸據詩疏以利養也利成尸告王利養成畢也右告利成記士禮主人出户外祝告利成特牲大夫禮主人出立階上告少牢天子阼階下乃告詩傳詩禮儀既備鐘鼓既戒孝孫徂位工祝致告傳士户外大夫階上尊者出稍逺也天子阼階下乃告彌尊故彌逺也告利成致尸意也孝子事親有尊親賔客之義命從尊出讓從賔來義由於尸非主人所當發也大夫士祝告主人而止天子祝告更致天子意於尸彌尊備儀盡飾益有節文也詩疏尸謖金奏肆夏祝令小祝送尸出廟門祝不出尸入於次釋服掌祧受之尸乃歸掌祧藏尸隋與其服據周禮及詩疏肆謖起也祝令令樂師鼓鐘而樂人遂入奏夏也隋尸所祭肺黍稷之屬掌祧埋之右祭畢尸出記隋埋兩階之東服各藏於寢周禮疏詩神具醉止皇尸載起鼓鐘送尸神保聿歸傳迎尸以祝送尸以小祝禮殺也祝不出門事尸以門斷也遣助祭諸侯歸其國歌臣工據詩毛傳及蔡氏雍筆斷孔曰諸侯春來朝於王必待助王之祭而去故於祭末因廟中遣之狩按祭以首時而詩言維暮之春者周改時改月而巡蒸享皆自夏時建寅之月於周為莫春也春諸侯助祭歸歌此詩不知夏秋冬何歌或詩皆逸歟抑周重農故但以農事之首告之歟右遣助祭諸侯歸其國詩嗟嗟臣工敬爾在公王釐爾成來咨來茹臣工孔謂指其從行之臣不斥其身故呼其卿大夫及車右以警切之欲諸侯聞之亦敬其事而不敢自専也傳諸侯有不純臣之義故於其歸因廟中正君臣之禮焉按諸侯於此時歸國則前必得一獻可知太祝令徹后徹豆籩九嬪贊后徹內宗受之傳外宗外宗受之傳有司諸宰徹玉齍玉敦黍稷牲俎小祝贊徹樂師帥學士而歌徹據周禮及詩學婦人徹止豆籩婦人弱也士謂國子右徹記非祭不相授器內則王后不與則大宗伯攝而徹周禮其大宗伯徹則外宗贊宗伯有薦之必有其徹之也詩諸宰君婦廢徹不遲傳不遲以疾為敬不留神惠之意也朱傳外宗傳有司男女親授祭嚴也大宗伯攝徹內宗親受祭嚴也雖親授受不相襲處猶為有别乎爾禮疏謂按鄭氏謂徹者歌雍朱子雍本武王祭文王而徹之詩後遂用之他廟亦名為徹王氏謂徹必歌雍取其肅肅雍雍也凡人之情樂於始或倦於終篤於暫或怠於久至徹而終不失其和敬誠之至也愚按此詩並無一言及於徹俎有來至止亦不似祭畢徹俎語且周人以諱事神恐無祭文王而歌克昌厥後明犯其諱之理若必以文母為太姒何以不稱文考而曰烈考乎觀周禮言歌徹不言歌雍疑周公制禮本有徹詩而逸之鄭氏特據論語遂因附會之也仲尼燕居篇言徹以振羽又唐人引禮記客出以雍徹句竊疑獻二王後獻賔皆即徹其俎以歸於其館故槩名其詩為徹亦未可知又按小序以雍為禘太祖愚謂周之禘自當歌后稷而及其所自生今按其文不及薑嫄后稷則亦非也或魯以禘禮祀周公以右烈考文母於公為近故假以歌而魯習傳之歟祝命佐食以六簋陳於堂王餕王謖世子餕世子謖公卿大夫士以次餕據文王世子及祭統謖猶起也右餕記天子之禮餕以上嗣文王世子諸侯禮尸謖君與卿四人餕君起大夫六人餕大夫起士八人餕士起各執其具以出陳於堂百官餕徹之祭統送餕者出君不君尊也大夫禮司宫設對席上佐食下佐食賔長二人餕上餕親嘏主人士禮嗣子及長兄弟二人對餕主人西面再拜戒族人少牢特牲侯按士餕止及兄弟鄭曰惠不過族親也而諸之餕止及其臣大夫之餕止及賔與佐食惠皆有所不能遍蓋順而討摲而播各得天子之禮節而已天子內親九族外撫萬邦則於族於臣於執事必皆有以及之矣士二簋餕以一大夫四簋餕以二諸侯六簋餕以四天子八簋餕以六按不以餕者士留為陽厭諸侯留為隂獻大夫無陽厭不知何用意即賔尸用之歟辭大夫之禮上餕親嘏曰主人受祭之福胡夀保建宜家士之禮主人親祝曰餕有以也又曰酳有與也少牢特牲之胡夀胡考之夀有以言今得此餕者以祖考德有與言今得此酳者當似祖考之德皆戒辭也必按天子備儀盡飾則嘏祝二者當兼之而辭更詳矣傳餕以上嗣尊祖之道也文王世子王世子餕諸侯世子不餕避王也禮疏內按此據祭統不言世子然疑屬畿諸侯若外諸侯世國自當餕也若外諸侯不餕則大夫無為避君矣大夫之世子不餕避君也士之嗣子亦餕卑無嫌也凡餕之道每變以衆所以别尊卑之等而興施惠之象也是故以四簋黍見其修於廟中也廟中者境內之象也祭統子此諸侯禮若天則六簋佐食徹尸薦俎及二簋黍入於室當屋漏下納一尊於房祝入室王入室事主再拜稽首祝以孝告王又再拜稽首出佐食闔牖户如食間祝告利成於王據特牲及詩疏此尊當繫饋食之尊右再事主於室鄭曰是謂陽厭陸説已見於前記大夫陽厭南面士陽厭東面少牢特牲並按抑詩疏天子有陽厭諸侯同惟諸侯上大夫無陽厭以即賔尸也又按儀禮諸侯下大夫不賔尸則亦有陽厭傳孔子曰當室之白尊於東房是謂陽厭曽子問天子諸侯陽厭東面大夫陽厭南面避君也士亦東面卑無嫌也孔疏若按天子諸侯東面亦謂各於其廟耳祫則太祖主東面餘當南北相向禘則太祖主與所自出東西相向宗伯告事畢賔出小宗伯送奏陔是小宗伯不出門王出奏王夏后出奏齊夏祝命徹佐食徹以出與祭者各復其齊宫以俟右事畢記及祭之後陶陶遂遂如將復入然陶陶舒遲貌遂遂竦敬貌已徹而退敬齊之色不絶於面俱祭義詩被之僮僮夙夜在公被之祁祁薄言還歸此言諸侯之夫人也夜在公先夕視濯溉朝在公祭朝視饎爨王后先夕無事傳詩曰明發不寐有懷二人文王之詩也祭之明日明發不寐饗而致之又從而思之鄭曰祭之明日謂繹日也按明發謂繹日將旦之時言正祭既饗而致之而孝思未已於此明發時又從而思之遂起而為繹祭也二人父母也孔以明日為繹之明日或以二人為指尸侑皆非天子肆獻祼饋食禮卷中
